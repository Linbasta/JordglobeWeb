<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-itunes-app" content="app-id=1599500931">
    <title>US States Quiz</title>
    <style>
        html, body { height: 100%; }
        body { margin: 0; overflow: hidden; }
        body.placing-mode { cursor: none; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>

<body>
    <canvas id="renderCanvas"></canvas>
    <script type="module">
        import { initAppBanner } from '/src/shared/ui/app-banner.ts';
        import { startQuizGame } from '/src/solo/start-quiz-game.ts';
        initAppBanner();

        const usStates = [
            { id: 0, name: 'Alabama' },
            { id: 1, name: 'Alaska' },
            { id: 2, name: 'Arizona' },
            { id: 3, name: 'Arkansas' },
            { id: 4, name: 'California' },
            { id: 5, name: 'Colorado' },
            { id: 6, name: 'Connecticut' },
            { id: 7, name: 'Delaware' },
            { id: 8, name: 'Florida' },
            { id: 9, name: 'Georgia' },
            { id: 10, name: 'Hawaii' },
            { id: 11, name: 'Idaho' },
            { id: 12, name: 'Illinois' },
            { id: 13, name: 'Indiana' },
            { id: 14, name: 'Iowa' },
            { id: 15, name: 'Kansas' },
            { id: 16, name: 'Kentucky' },
            { id: 17, name: 'Louisiana' },
            { id: 18, name: 'Maine' },
            { id: 19, name: 'Maryland' },
            { id: 20, name: 'Massachusetts' },
            { id: 21, name: 'Michigan' },
            { id: 22, name: 'Minnesota' },
            { id: 23, name: 'Mississippi' },
            { id: 24, name: 'Missouri' },
            { id: 25, name: 'Montana' },
            { id: 26, name: 'Nebraska' },
            { id: 27, name: 'Nevada' },
            { id: 28, name: 'New Hampshire' },
            { id: 29, name: 'New Jersey' },
            { id: 30, name: 'New Mexico' },
            { id: 31, name: 'New York' },
            { id: 32, name: 'North Carolina' },
            { id: 33, name: 'North Dakota' },
            { id: 34, name: 'Ohio' },
            { id: 35, name: 'Oklahoma' },
            { id: 36, name: 'Oregon' },
            { id: 37, name: 'Pennsylvania' },
            { id: 38, name: 'Rhode Island' },
            { id: 39, name: 'South Carolina' },
            { id: 40, name: 'South Dakota' },
            { id: 41, name: 'Tennessee' },
            { id: 42, name: 'Texas' },
            { id: 43, name: 'Utah' },
            { id: 44, name: 'Vermont' },

            { id: 47, name: 'West Virginia' },
            { id: 48, name: 'Wisconsin' },
            { id: 49, name: 'Wyoming' },
        ];

        startQuizGame({
            title: 'US States Quiz',
            questions: usStates.map(state => ({
                present: 'text',
                answer: 'province',
                provinceId: state.id,
                countryISO2: 'US',
                prompt: state.name,
            })),
            onGameComplete: (score, total) => {
                const percentage = Math.round((score / total) * 100);
                alert(`Quiz Complete!\n\nScore: ${score}/${total} (${percentage}%)\n\nReload page to play again!`);
            }
        });
    </script>
</body>

</html>

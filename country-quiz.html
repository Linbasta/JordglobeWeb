<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Quiz Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        body.placing-mode { cursor: none; }
        #renderCanvas { width: 100%; height: 100vh; touch-action: none; }
    </style>
</head>

<body>
    <canvas id="renderCanvas"></canvas>
    <script type="module">
        import { startQuizGame } from '/src/solo/start-quiz-game.ts';

        const countries = [
            'SE', 'NO', 'FI', 'DK', 'IS',
            'GB', 'IE', 'FR', 'ES', 'PT',
            'DE', 'NL', 'BE', 'LU', 'CH', 'AT',
            'IT', 'GR', 'MT', 'CY', 'MC', 'SM', 'VA', 'LI',
            'PL', 'CZ', 'SK', 'HU', 'RO', 'BG',
            'EE', 'LV', 'LT',
        ];

        startQuizGame({
            title: 'Loading Country Quiz',
            questions: countries.map(iso2 => ({
                present: 'text',
                answer: 'country',
                countryISO2: iso2,
                prompt: '',
            })),
            onGameComplete: (score, total) => {
                alert(`Quiz Complete!\n\nScore: ${score}/${total}\n\nReload page to play again!`);
            }
        });
    </script>
</body>

</html>

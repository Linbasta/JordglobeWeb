<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-itunes-app" content="app-id=1599500931">
    <meta name="theme-color" content="#6496DC">
    <title>Country Quiz - Find Countries on the Globe | JordGlobe</title>
    <meta name="description" content="Can you find countries on a 3D globe? Test your geography skills by locating countries around the world in this interactive quiz game.">
    <link rel="canonical" href="https://jordglobe.com/country-quiz">
    <!-- Open Graph -->
    <meta property="og:title" content="Country Quiz - Find Countries on the Globe">
    <meta property="og:description" content="Can you find countries on a 3D globe? Test your geography skills in this interactive quiz.">
    <meta property="og:image" content="https://jordglobe.com/og-image.png">
    <meta property="og:url" content="https://jordglobe.com/country-quiz">
    <meta property="og:type" content="website">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Country Quiz - Find Countries on the Globe">
    <meta name="twitter:description" content="Can you find countries on a 3D globe? Test your geography skills.">
    <meta name="twitter:image" content="https://jordglobe.com/og-image.png">
    <style>
        html, body { height: 100%; }
        body { margin: 0; overflow: hidden; background-color: #6496DC; }
        /* TEMP: cursor visible for debugging */
        /* body.placing-mode { cursor: none; } */
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
        /* TEMP: scroll zone markers (positioned via JS) */
        .scroll-zone-marker {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255, 0, 0, 0.5);
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>

<body>
    <canvas id="renderCanvas"></canvas>
    <!-- TEMP: scroll zone markers -->
    <div class="scroll-zone-marker left"></div>
    <div class="scroll-zone-marker right"></div>
    <script type="module">
        import { initMobile } from '/src/shared/ui/mobile-init.ts';
        import { startQuizGame } from '/src/solo/start-quiz-game.ts';
        import { getCurrentEdgeX } from '/src/shared/managers/pin-scroll.ts';
        initMobile();

        // TEMP: Update scroll zone markers dynamically
        const leftMarker = document.querySelector('.scroll-zone-marker.left');
        const rightMarker = document.querySelector('.scroll-zone-marker.right');
        function updateMarkers() {
            const edgeX = getCurrentEdgeX();
            const pct = (edgeX * 100).toFixed(1) + '%';
            leftMarker.style.left = pct;
            rightMarker.style.right = pct;
            requestAnimationFrame(updateMarkers);
        }
        requestAnimationFrame(updateMarkers);

        const countries = [
            { iso2: 'SE', name: 'Sweden' },
            { iso2: 'NO', name: 'Norway' },
            { iso2: 'FI', name: 'Finland' },
            { iso2: 'DK', name: 'Denmark' },
            { iso2: 'IS', name: 'Iceland' },
            { iso2: 'GB', name: 'United Kingdom' },
            { iso2: 'IE', name: 'Ireland' },
            { iso2: 'FR', name: 'France' },
            { iso2: 'ES', name: 'Spain' },
            { iso2: 'PT', name: 'Portugal' },
            { iso2: 'DE', name: 'Germany' },
            { iso2: 'NL', name: 'Netherlands' },
            { iso2: 'BE', name: 'Belgium' },
            { iso2: 'LU', name: 'Luxembourg' },
            { iso2: 'CH', name: 'Switzerland' },
            { iso2: 'AT', name: 'Austria' },
            { iso2: 'IT', name: 'Italy' },
            { iso2: 'GR', name: 'Greece' },
            { iso2: 'MT', name: 'Malta' },
            { iso2: 'CY', name: 'Cyprus' },
            { iso2: 'MC', name: 'Monaco' },
            { iso2: 'SM', name: 'San Marino' },
            { iso2: 'VA', name: 'Vatican City' },
            { iso2: 'LI', name: 'Liechtenstein' },
            { iso2: 'PL', name: 'Poland' },
            { iso2: 'CZ', name: 'Czech Republic' },
            { iso2: 'SK', name: 'Slovakia' },
            { iso2: 'HU', name: 'Hungary' },
            { iso2: 'RO', name: 'Romania' },
            { iso2: 'BG', name: 'Bulgaria' },
            { iso2: 'EE', name: 'Estonia' },
            { iso2: 'LV', name: 'Latvia' },
            { iso2: 'LT', name: 'Lithuania' },
        ];

        startQuizGame({
            title: 'Loading Country Quiz',
            questions: countries.map(country => ({
                present: 'text',
                answer: 'country',
                countryISO2: country.iso2,
                prompt: country.name,
            })),
            onGameComplete: (score, total) => {
                alert(`Quiz Complete!\n\nScore: ${score}/${total}\n\nReload page to play again!`);
            }
        });
    </script>
</body>

</html>

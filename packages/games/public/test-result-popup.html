<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test: Result Popup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a1628; font-family: 'Arial', sans-serif; }

        /* Controls panel */
        #controls {
            position: fixed;
            top: 16px;
            left: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 300;
            max-width: 280px;
        }

        #controls button {
            padding: 8px 16px;
            font-family: monospace;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #555;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
        }
        #controls button:hover { background: rgba(60, 60, 60, 0.9); }

        .section-label {
            color: #7eb8e0;
            font-size: 11px;
            font-family: monospace;
            margin-top: 8px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        #pb-status {
            color: #7cf6ff;
            font-size: 12px;
            font-family: monospace;
            padding: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
            line-height: 1.4;
        }

        button.danger {
            background: rgba(180, 50, 50, 0.8);
            border-color: #a33;
        }
        button.danger:hover { background: rgba(200, 60, 60, 0.9); }

        button.pb-test {
            background: rgba(50, 100, 150, 0.8);
            border-color: #4a8;
        }
        button.pb-test:hover { background: rgba(60, 120, 170, 0.9); }
    </style>
</head>
<body>
    <div id="controls">
        <div class="section-label">Manual Tests</div>
        <button onclick="show(10, 10, 83000)">Perfect: 10/10, 1:23</button>
        <button onclick="show(8, 10, 102000)">Good: 8/10, 1:42</button>
        <button onclick="show(5, 10, 145000)">Mid: 5/10, 2:25</button>
        <button onclick="show(2, 10, 200000)">Bad: 2/10, 3:20</button>
        <button onclick="show(35, 35, 312000)">Perfect 35: 35/35, 5:12</button>
        <button onclick="show(1, 35, 400000)">Bad 35: 1/35, 6:40</button>
        <button onclick="show(10, 10, 83000, { isNewRecord: true })">World Record!</button>
        <button onclick="show(8, 10, 90000, { isPersonalBest: true })">Personal Best!</button>

        <div class="section-label">Personal Best (localStorage)</div>
        <div id="pb-status">Loading...</div>
        <button class="pb-test" onclick="testWithPB(5, 10, 120000)">Play: 5/10, 2:00</button>
        <button class="pb-test" onclick="testWithPB(7, 10, 100000)">Play: 7/10, 1:40</button>
        <button class="pb-test" onclick="testWithPB(8, 10, 90000)">Play: 8/10, 1:30</button>
        <button class="pb-test" onclick="testWithPB(8, 10, 70000)">Play: 8/10, 1:10 (faster)</button>
        <button class="danger" onclick="clearPB()">Clear Personal Best</button>

        <div class="section-label">Score Bar Preview</div>
        <button onclick="toggleScoreBar()">Toggle Score Bar</button>
    </div>

        <script type="module">
        import {
            showResultOverlay,
            hideResultOverlay,
            getPersonalBest,
            checkAndUpdatePersonalBest,
            clearPersonalBest
        } from '/src/shared/ui/result-overlay.ts';
        import {
            createSimpleScoreBar,
            updateSimpleScoreBar,
            disposeSimpleScoreBar
        } from '/src/shared/ui/score-bar-simple.ts';

        const QUIZ_ID = 'test-quiz';
        let scoreBarVisible = false;
        let scoreBarTimer = null;

        function randomResults(score, total) {
            const arr = Array(score).fill(true).concat(Array(total - score).fill(false));
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function updatePBStatus() {
            const pb = getPersonalBest(QUIZ_ID);
            const statusEl = document.getElementById('pb-status');
            if (pb) {
                statusEl.textContent = `Current PB: ${pb.score}/${pb.total} in ${formatTime(pb.elapsedMs)}`;
            } else {
                statusEl.textContent = 'No personal best yet';
            }
        }

        const spriteNames = ['Nul Points', 'Mildly Aware', 'Semi-Curious', 'Eurovision Lover', 'Devoted Fan', 'Eurovision God'];

        // Manual show (can override flags)
        window.show = function(score, total, elapsedMs, opts = {}) {
            showResultOverlay({
                score, total, elapsedMs,
                results: randomResults(score, total),
                quizTitle: 'Eurovision Quiz',
                shareUrl: 'https://jordglobe.com/eurovision',
                shareEmoji: '🎵',
                spritePath: '/eurovision/',
                spriteNames,
                getMessage: (s, t) => spriteNames[Math.max(0, Math.min(5, Math.ceil((s / t) * 6) - 1))],
                isNewRecord: opts.isNewRecord || false,
                isPersonalBest: opts.isPersonalBest || false,
                onRetry: () => hideResultOverlay(),
            });
        };

        // Test with actual personal best tracking
        window.testWithPB = function(score, total, elapsedMs) {
            const isPersonalBest = checkAndUpdatePersonalBest(QUIZ_ID, score, total, elapsedMs);
            updatePBStatus();
            console.log(`Score: ${score}/${total}, Time: ${formatTime(elapsedMs)}, Personal Best: ${isPersonalBest}`);

            showResultOverlay({
                score, total, elapsedMs,
                results: randomResults(score, total),
                quizTitle: 'Eurovision Quiz',
                shareUrl: 'https://jordglobe.com/eurovision',
                shareEmoji: '🎵',
                spritePath: '/eurovision/',
                spriteNames,
                getMessage: (s, t) => spriteNames[Math.max(0, Math.min(5, Math.ceil((s / t) * 6) - 1))],
                isPersonalBest,
                onRetry: () => hideResultOverlay(),
            });
        };

        // Clear personal best
        window.clearPB = function() {
            clearPersonalBest(QUIZ_ID);
            updatePBStatus();
            console.log('Personal best cleared');
        };

        // Toggle score bar (to preview PB display)
        window.toggleScoreBar = function() {
            if (scoreBarVisible) {
                disposeSimpleScoreBar();
                if (scoreBarTimer) {
                    clearInterval(scoreBarTimer);
                    scoreBarTimer = null;
                }
                scoreBarVisible = false;
                console.log('Score bar hidden');
            } else {
                createSimpleScoreBar(10, 10, QUIZ_ID);
                let elapsed = 0;
                let score = 0;
                scoreBarTimer = setInterval(() => {
                    elapsed += 1000;
                    if (Math.random() < 0.3 && score < 10) score++;
                    updateSimpleScoreBar(score, 10 - score, 10, elapsed);
                }, 1000);
                scoreBarVisible = true;
                console.log('Score bar shown with PB:', getPersonalBest(QUIZ_ID));
            }
        };

        // Initialize on load
        updatePBStatus();
        show(8, 10, 102000);
    </script>
</body>
</html>

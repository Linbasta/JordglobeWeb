<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Animation Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
        }

        #renderCanvas {
            width: 100%;
            height: 100vh;
            display: block;
        }

        #controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 8px;
            min-width: 300px;
            max-width: 400px;
            z-index: 100;
        }

        h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }

        input[type="range"] {
            width: 100%;
        }

        input[type="number"] {
            width: 100%;
            padding: 5px;
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 5px;
        }

        button:hover {
            background: #45a049;
        }

        button.secondary {
            background: #2196F3;
        }

        button.secondary:hover {
            background: #0b7dda;
        }

        .value-display {
            font-size: 12px;
            color: #aaa;
            margin-top: 3px;
        }

        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
        }

        #info div {
            margin: 3px 0;
        }

        #viewportOverlay {
            position: fixed;
            border: 2px dashed #4CAF50;
            pointer-events: none;
            z-index: 50;
            display: none;
            background: rgba(76, 175, 80, 0.1);
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <div id="viewportOverlay"></div>

    <div id="controls">
        <h2>Camera Animation Test</h2>

        <div class="control-group">
            <label>Select Country:</label>
            <select id="countrySelect">
                <option value="">-- Select a country --</option>
            </select>
        </div>

        <div class="control-group">
            <label>Target Radius (zoom): <span id="radiusValue">5.0</span></label>
            <input type="range" id="radiusSlider" min="3" max="15" step="0.1" value="5.0">
        </div>

        <div class="control-group">
            <label>Duration (ms): <span id="durationValue">1000</span></label>
            <input type="range" id="durationSlider" min="100" max="3000" step="100" value="1000">
        </div>

        <div class="control-group">
            <label>
                <input type="checkbox" id="useViewportRegion"> Use Viewport Region
            </label>
            <div class="value-display">Country always centered horizontally</div>
        </div>

        <div id="viewportRegionControls" style="display: none;">
            <div class="control-group">
                <label>Region Y (top): <span id="regionYValue">0.00</span></label>
                <input type="range" id="regionYSlider" min="0" max="1" step="0.01" value="0">
            </div>

            <div class="control-group">
                <label>Region Width: <span id="regionWidthValue">0.50</span></label>
                <input type="range" id="regionWidthSlider" min="0.1" max="1" step="0.01" value="0.5">
            </div>

            <div class="control-group">
                <label>Region Height: <span id="regionHeightValue">0.80</span></label>
                <input type="range" id="regionHeightSlider" min="0.1" max="1" step="0.01" value="0.8">
            </div>

            <div class="control-group">
                <label>Performance Mode:</label>
                <select id="performanceMode">
                    <option value="quality">Quality (20×20 + 15×15) ~11k checks</option>
                    <option value="balanced" selected>Balanced (10×10 + 8×8) ~1.5k checks</option>
                    <option value="fast">Fast (8×8 + 6×6) ~728 checks</option>
                    <option value="ultra">Ultra Fast (6×6 + 5×5) ~341 checks</option>
                    <option value="custom">Custom...</option>
                </select>
            </div>

            <div id="customGridControls" style="display: none;">
                <div class="control-group">
                    <label>Coarse Grid Size: <span id="coarseGridValue">10</span></label>
                    <input type="range" id="coarseGridSlider" min="4" max="20" step="1" value="10">
                    <div class="value-display">Checks: <span id="coarseChecks">1,000</span></div>
                </div>

                <div class="control-group">
                    <label>Fine Grid Size: <span id="fineGridValue">8</span></label>
                    <input type="range" id="fineGridSlider" min="3" max="15" step="1" value="8">
                    <div class="value-display">Checks: <span id="fineChecks">512</span></div>
                </div>
            </div>
        </div>

        <button id="animateBtn">Animate to Country (Manual Zoom)</button>
        <button id="frameBtn" class="secondary">Frame Country (Auto Zoom)</button>
        <button id="resetBtn" class="secondary">Reset Camera</button>
        <button id="logStateBtn" style="background: #4CAF50; margin-top: 10px;">📸 Frame is Good! (Log State)</button>

        <div class="value-display">
            Click on globe or use dropdown to select country
        </div>
    </div>

    <div id="info">
        <div><strong>Current Camera:</strong></div>
        <div>Radius: <span id="currentRadius">-</span></div>
        <div>Alpha: <span id="currentAlpha">-</span></div>
        <div>Beta: <span id="currentBeta">-</span></div>
        <div style="margin-top: 10px;"><strong>Target:</strong></div>
        <div>Country: <span id="targetCountry">-</span></div>
        <div>Lat/Lon: <span id="targetLatLon">-</span></div>
        <div style="margin-top: 10px;"><strong>Performance:</strong></div>
        <div>Grid: <span id="gridSizes">-</span></div>
        <div>Checks: <span id="convergenceIterations">-</span></div>
        <div>Center Error: <span id="convergenceError" style="font-weight: bold;">-</span></div>
        <div>Solve time: <span id="convergenceSolveTime">-</span></div>
        <div>Status: <span id="convergenceStatus">-</span></div>
    </div>

    <!-- Console logger -->
    
    <script type="module">
        import { SoloGameController } from './src/solo/solo-game-controller.ts';
        import { animateToLocation, frameCountry } from './src/shared/animation/camera-utils.ts';
        import { Vector3 } from '@babylonjs/core/Maths/math.vector';
        import { Matrix } from '@babylonjs/core/Maths/math.vector';

        let game;
        let selectedCountry = null;
        let selectedLatLon = null;

        // Define functions first
        function populateCountryDropdown() {
            const globe = game.getGlobe();
            const countries = globe.getAllCountries();

            console.log('Populating dropdown with', countries.length, 'countries');

            // Sort countries by name
            const sortedCountries = countries.sort((a, b) => a.name.localeCompare(b.name));

            const select = document.getElementById('countrySelect');
            sortedCountries.forEach(country => {
                const option = document.createElement('option');
                option.value = country.index;
                option.textContent = `${country.name} (${country.iso2})`;
                select.appendChild(option);
            });

            console.log('Dropdown populated with', select.options.length - 1, 'countries');
        }

        function selectCountry(country, latLon) {
            selectedCountry = country;
            selectedLatLon = latLon;

            document.getElementById('targetCountry').textContent = country.name;
            document.getElementById('targetLatLon').textContent = `${latLon.lat.toFixed(2)}, ${latLon.lon.toFixed(2)}`;

            // Update dropdown - handle both CountryPolygon (countryIndex) and CountryData (index)
            const dropdownValue = country.countryIndex !== undefined ? country.countryIndex : country.index;
            document.getElementById('countrySelect').value = dropdownValue;

            console.log(`Selected: ${country.name} at (${latLon.lat.toFixed(2)}, ${latLon.lon.toFixed(2)})`);
        }

        function updateCameraInfo(camera) {
            document.getElementById('currentRadius').textContent = camera.radius.toFixed(2);
            document.getElementById('currentAlpha').textContent = camera.alpha.toFixed(2);
            document.getElementById('currentBeta').textContent = camera.beta.toFixed(2);
        }

        // Create game
        game = new SoloGameController('renderCanvas', {
            showCountryLabel: false,
            showHoverLabel: true,
            onReady: async (controller) => {
                console.log('Camera animation test ready!');

                // Populate country dropdown
                populateCountryDropdown();

                // Handle country clicks
                controller.getPinManager().onPinPlaced((country, latLon) => {
                    if (country) {
                        selectCountry(country, latLon);
                    }
                });

                // Update camera info every frame
                const camera = controller.getGlobe().getCamera();
                setInterval(() => {
                    updateCameraInfo(camera);
                }, 100);

                // AUTO-FRAME ALBANIA FOR TESTING
                console.log('=== AUTO-FRAMING ALBANIA FOR TESTING ===');

                // Enable viewport region with problematic values
                document.getElementById('useViewportRegion').checked = true;
                document.getElementById('viewportRegionControls').style.display = 'block';
                document.getElementById('regionYSlider').value = '0';
                document.getElementById('regionYValue').textContent = '0.00';
                document.getElementById('regionHeightSlider').value = '0.4';
                document.getElementById('regionHeightValue').textContent = '0.40';
                document.getElementById('maxIterationsSlider').value = '20';
                document.getElementById('maxIterationsValue').textContent = '20';
                updateViewportOverlay();

                // Test Russia (change to 'Sweden' or 'Albania' to test other countries)
                const testCountryISO2 = 'RU'; // RU = Russia, SE = Sweden, AL = Albania
                const globe = controller.getGlobe();
                const testCountry = globe.getCountryByISO2(testCountryISO2);
                const allPolygons = globe.getCountryPicker().getAllPolygons();
                const testPolygon = allPolygons.find(p => p.countryIndex === testCountry?.index);

                if (testCountry && testPolygon) {
                    selectCountry(testCountry, { lat: testPolygon.points[0].lat, lon: testPolygon.points[0].lon });

                    // Wait a bit for UI to settle
                    await new Promise(resolve => setTimeout(resolve, 500));

                    // Auto-frame with viewport region
                    const testPolygons = allPolygons.filter(p => p.countryIndex === testCountry.index);
                    const width = 0.5;
                    const height = 0.86; // Increased for Russia
                    const y = 0;
                    const x = (1 - width) / 2;

                    const viewportRegion = { x, y, width, height };

                    console.log(`Auto-framing ${testCountry.name} with viewport region:`, viewportRegion);

                    const stats = await frameCountry(
                        controller.getGlobe().getCamera(),
                        controller.getGlobe(),
                        testPolygons,
                        testCountry.name,
                        1000,
                        0.8,
                        viewportRegion,
                        20  // Increased max iterations for Russia
                    );

                    console.log(`Auto-frame ${testCountry.name} complete:`, stats);

                    // Update convergence display
                    if (stats) {
                        document.getElementById('convergenceIterations').textContent = stats.iterations;
                        document.getElementById('convergenceError').textContent = (stats.finalError * 100).toFixed(2) + '%';
                        document.getElementById('convergenceSolveTime').textContent = stats.solveTime.toFixed(2) + 'ms';
                        document.getElementById('convergenceStatus').textContent = stats.converged ? '✓ Converged' : '✗ Not converged';
                        document.getElementById('convergenceStatus').style.color = stats.converged ? '#4CAF50' : '#f44336';
                    }
                }
            }
        });

        // Slider updates
        document.getElementById('radiusSlider').addEventListener('input', (e) => {
            document.getElementById('radiusValue').textContent = e.target.value;
        });

        document.getElementById('durationSlider').addEventListener('input', (e) => {
            document.getElementById('durationValue').textContent = e.target.value;
        });

        // Update viewport overlay visualization
        function updateViewportOverlay() {
            const overlay = document.getElementById('viewportOverlay');
            const useRegion = document.getElementById('useViewportRegion').checked;

            if (useRegion) {
                const y = parseFloat(document.getElementById('regionYSlider').value);
                const width = parseFloat(document.getElementById('regionWidthSlider').value);
                const height = parseFloat(document.getElementById('regionHeightSlider').value);

                const screenWidth = window.innerWidth;
                const screenHeight = window.innerHeight;

                // Center horizontally based on width
                const x = (1 - width) / 2;

                overlay.style.left = (x * screenWidth) + 'px';
                overlay.style.top = (y * screenHeight) + 'px';
                overlay.style.width = (width * screenWidth) + 'px';
                overlay.style.height = (height * screenHeight) + 'px';
                overlay.style.display = 'block';
            } else {
                overlay.style.display = 'none';
            }
        }

        // Viewport region controls
        document.getElementById('useViewportRegion').addEventListener('change', (e) => {
            const controls = document.getElementById('viewportRegionControls');
            controls.style.display = e.target.checked ? 'block' : 'none';
            updateViewportOverlay();
        });

        document.getElementById('regionYSlider').addEventListener('input', (e) => {
            document.getElementById('regionYValue').textContent = parseFloat(e.target.value).toFixed(2);
            updateViewportOverlay();
        });

        document.getElementById('regionWidthSlider').addEventListener('input', (e) => {
            document.getElementById('regionWidthValue').textContent = parseFloat(e.target.value).toFixed(2);
            updateViewportOverlay();
        });

        document.getElementById('regionHeightSlider').addEventListener('input', (e) => {
            document.getElementById('regionHeightValue').textContent = parseFloat(e.target.value).toFixed(2);
            updateViewportOverlay();
        });

        // Performance mode controls
        document.getElementById('performanceMode').addEventListener('change', (e) => {
            const customControls = document.getElementById('customGridControls');
            const mode = e.target.value;

            if (mode === 'custom') {
                customControls.style.display = 'block';
            } else {
                customControls.style.display = 'none';

                // Set preset values
                const presets = {
                    quality: { coarse: 20, fine: 15 },
                    balanced: { coarse: 10, fine: 8 },
                    fast: { coarse: 8, fine: 6 },
                    ultra: { coarse: 6, fine: 5 }
                };

                if (presets[mode]) {
                    document.getElementById('coarseGridSlider').value = presets[mode].coarse;
                    document.getElementById('coarseGridValue').textContent = presets[mode].coarse;
                    document.getElementById('coarseChecks').textContent = (presets[mode].coarse ** 3).toLocaleString();

                    document.getElementById('fineGridSlider').value = presets[mode].fine;
                    document.getElementById('fineGridValue').textContent = presets[mode].fine;
                    document.getElementById('fineChecks').textContent = (presets[mode].fine ** 3).toLocaleString();
                }
            }
        });

        document.getElementById('coarseGridSlider').addEventListener('input', (e) => {
            const value = parseInt(e.target.value);
            document.getElementById('coarseGridValue').textContent = value;
            document.getElementById('coarseChecks').textContent = (value ** 3).toLocaleString();
        });

        document.getElementById('fineGridSlider').addEventListener('input', (e) => {
            const value = parseInt(e.target.value);
            document.getElementById('fineGridValue').textContent = value;
            document.getElementById('fineChecks').textContent = (value ** 3).toLocaleString();
        });

        // Update overlay on window resize
        window.addEventListener('resize', updateViewportOverlay);

        // Country dropdown
        document.getElementById('countrySelect').addEventListener('change', (e) => {
            console.log('Dropdown changed:', e.target.value);
            const countryIndex = parseInt(e.target.value);
            if (!isNaN(countryIndex)) {
                const globe = game.getGlobe();
                const country = globe.getAllCountries().find(c => c.index === countryIndex);
                console.log('Found country:', country);
                if (country) {
                    // Get a representative lat/lon from the country
                    // Find the first polygon that belongs to this country
                    const allPolygons = globe.getCountryPicker().getAllPolygons();
                    const polygon = allPolygons.find(p => p.countryIndex === countryIndex);
                    console.log('Found polygon:', polygon);
                    if (polygon && polygon.points.length > 0) {
                        const firstPoint = polygon.points[0];
                        console.log('Selecting country from dropdown:', country.name, firstPoint);
                        selectCountry(country, { lat: firstPoint.lat, lon: firstPoint.lon });
                    } else {
                        console.error('No polygon found for country:', country.name);
                    }
                }
            }
        });

        // Animate button (manual zoom)
        document.getElementById('animateBtn').addEventListener('click', async () => {
            console.log('Animate clicked. selectedCountry:', selectedCountry, 'selectedLatLon:', selectedLatLon);
            if (!selectedCountry || !selectedLatLon) {
                alert('Please select a country first (click on globe or use dropdown)');
                return;
            }

            const targetRadius = parseFloat(document.getElementById('radiusSlider').value);
            const duration = parseInt(document.getElementById('durationSlider').value);

            console.log(`Animating to ${selectedCountry.name} at radius ${targetRadius} over ${duration}ms`);

            await animateToLocation(
                game.getGlobe().getCamera(),
                selectedLatLon.lat,
                selectedLatLon.lon,
                targetRadius,
                duration
            );

            console.log('Animation complete!');
        });

        // Frame button (auto zoom)
        document.getElementById('frameBtn').addEventListener('click', async () => {
            console.log('Frame clicked. selectedCountry:', selectedCountry);
            if (!selectedCountry) {
                alert('Please select a country first (click on globe or use dropdown)');
                return;
            }

            const duration = parseInt(document.getElementById('durationSlider').value);

            // Get ALL polygons for this country (important for multi-part countries like Russia)
            const globe = game.getGlobe();
            const allPolygons = globe.getCountryPicker().getAllPolygons();
            const countryIndex = selectedCountry.countryIndex !== undefined ? selectedCountry.countryIndex : selectedCountry.index;

            // Find ALL polygons that belong to this country
            const countryPolygons = allPolygons.filter(p => p.countryIndex === countryIndex);

            if (countryPolygons.length === 0) {
                alert('Could not find polygons for country');
                console.error('No polygons found for country:', selectedCountry);
                return;
            }

            // Get viewport region if enabled
            let viewportRegion = undefined;
            if (document.getElementById('useViewportRegion').checked) {
                const width = parseFloat(document.getElementById('regionWidthSlider').value);
                const height = parseFloat(document.getElementById('regionHeightSlider').value);
                const y = parseFloat(document.getElementById('regionYSlider').value);

                // Calculate centered x position
                const x = (1 - width) / 2;

                viewportRegion = {
                    x: x,
                    y: y,
                    width: width,
                    height: height
                };
                console.log('Using viewport region:', viewportRegion);
            }

            // Get grid configuration
            let gridConfig = undefined;
            if (viewportRegion) {
                const coarseGridSize = parseInt(document.getElementById('coarseGridSlider').value);
                const fineGridSize = parseInt(document.getElementById('fineGridSlider').value);
                gridConfig = {
                    coarseGridSize,
                    fineGridSize,
                    showDebugVisualization: true  // Show debug frames in test page
                };
            }

            console.log(`Auto-framing ${selectedCountry.name} (${countryPolygons.length} polygons) over ${duration}ms`);
            if (gridConfig) {
                console.log(`Grid config: ${gridConfig.coarseGridSize}×${gridConfig.coarseGridSize}×${gridConfig.coarseGridSize} + ${gridConfig.fineGridSize}×${gridConfig.fineGridSize}×${gridConfig.fineGridSize}`);
            }

            const startTime = performance.now();
            const stats = await frameCountry(
                game.getGlobe().getCamera(),
                game.getGlobe(),
                countryPolygons,
                selectedCountry.name,
                duration,
                0.8,  // margin
                viewportRegion,
                100,  // maxIterations (unused)
                gridConfig
            );
            const totalTime = performance.now() - startTime;

            console.log('Framing complete!', stats);

            // Update performance display (always show stats now)
            if (stats) {
                // Show grid sizes used
                if (gridConfig) {
                    document.getElementById('gridSizes').textContent = `${gridConfig.coarseGridSize}×${gridConfig.coarseGridSize}×${gridConfig.coarseGridSize} + ${gridConfig.fineGridSize}×${gridConfig.fineGridSize}×${gridConfig.fineGridSize}`;
                } else {
                    document.getElementById('gridSizes').textContent = 'Binary search';
                }

                document.getElementById('convergenceIterations').textContent = stats.iterations.toLocaleString();

                // Color-code error: green <1%, yellow 1-2%, red >2%
                const errorPercent = stats.finalError * 100;
                const errorEl = document.getElementById('convergenceError');
                errorEl.textContent = errorPercent.toFixed(2) + '%';
                if (errorPercent < 1) {
                    errorEl.style.color = '#4CAF50'; // green
                } else if (errorPercent < 2) {
                    errorEl.style.color = '#FFC107'; // yellow
                } else {
                    errorEl.style.color = '#f44336'; // red
                }

                document.getElementById('convergenceSolveTime').textContent = stats.solveTime.toFixed(1) + 'ms';

                if (viewportRegion) {
                    document.getElementById('convergenceStatus').textContent = stats.converged ? '✓ Centered' : '✗ Not centered';
                    document.getElementById('convergenceStatus').style.color = stats.converged ? '#4CAF50' : '#f44336';
                } else {
                    document.getElementById('convergenceStatus').textContent = '✓ Complete';
                    document.getElementById('convergenceStatus').style.color = '#4CAF50';
                }
            } else {
                document.getElementById('gridSizes').textContent = '-';
                document.getElementById('convergenceIterations').textContent = '-';
                document.getElementById('convergenceError').textContent = '-';
                document.getElementById('convergenceSolveTime').textContent = '-';
                document.getElementById('convergenceStatus').textContent = '-';
                document.getElementById('convergenceStatus').style.color = '#ccc';
            }
        });

        // Reset button
        document.getElementById('resetBtn').addEventListener('click', async () => {
            const duration = parseInt(document.getElementById('durationSlider').value);
            console.log('Resetting camera...');

            await animateToLocation(game.getGlobe().getCamera(), 0, 0, 10, duration);

            console.log('Camera reset!');
        });

        // Log State button - capture current "good" framing
        document.getElementById('logStateBtn').addEventListener('click', () => {
            if (!selectedCountry) {
                alert('Please select a country first');
                return;
            }

            const globe = game.getGlobe();
            const camera = globe.getCamera();

            // Get viewport region settings
            const useRegion = document.getElementById('useViewportRegion').checked;
            let viewportRegion = null;
            if (useRegion) {
                const width = parseFloat(document.getElementById('regionWidthSlider').value);
                const height = parseFloat(document.getElementById('regionHeightSlider').value);
                const y = parseFloat(document.getElementById('regionYSlider').value);
                const x = (1 - width) / 2;
                viewportRegion = { x, y, width, height };
            }

            // Get country polygons
            const allPolygons = globe.getCountryPicker().getAllPolygons();
            const countryIndex = selectedCountry.countryIndex !== undefined ? selectedCountry.countryIndex : selectedCountry.index;
            const countryPolygons = allPolygons.filter(p => p.countryIndex === countryIndex);

            // Calculate country bounding box
            let minLat = Infinity, maxLat = -Infinity;
            const allLons = [];
            for (const polygon of countryPolygons) {
                minLat = Math.min(minLat, polygon.bbox.minLat);
                maxLat = Math.max(maxLat, polygon.bbox.maxLat);
                for (const point of polygon.points) {
                    allLons.push(point.lon);
                }
            }
            let minLon = Math.min(...allLons);
            let maxLon = Math.max(...allLons);
            const deltaLon = maxLon - minLon;
            const deltaLat = maxLat - minLat;

            // Calculate country center (same method as frameCountry)
            const allPoints = countryPolygons.flatMap(p => p.points);
            let sumX = 0, sumY = 0, sumZ = 0;
            for (const point of allPoints) {
                const latRad = point.lat * (Math.PI / 180);
                const lonRad = point.lon * (Math.PI / 180);
                const x = Math.cos(latRad) * Math.cos(lonRad);
                const y = Math.sin(latRad);
                const z = Math.cos(latRad) * Math.sin(lonRad);
                sumX += x; sumY += y; sumZ += z;
            }
            const length = Math.sqrt(sumX * sumX + sumY * sumY + sumZ * sumZ);
            const centerLat = Math.asin(sumY / length) * (180 / Math.PI);
            const centerLon = Math.atan2(sumZ / length, sumX / length) * (180 / Math.PI);

            // Project country center to screen (using current camera position)
            const scene = camera.getScene();
            const engine = scene.getEngine();

            // Create world position vector for country center
            const worldPos = new Vector3(
                Math.cos(centerLat * Math.PI / 180) * Math.cos(centerLon * Math.PI / 180),
                Math.sin(centerLat * Math.PI / 180),
                Math.cos(centerLat * Math.PI / 180) * Math.sin(centerLon * Math.PI / 180)
            );

            const viewport = camera.viewport.toGlobal(engine.getRenderWidth(), engine.getRenderHeight());
            const screenPos = Vector3.Project(
                worldPos,
                Matrix.Identity(),
                scene.getTransformMatrix(),
                viewport
            );
            const actualScreenY = screenPos.y / engine.getRenderHeight();

            // Build the log object
            const goodFrameState = {
                timestamp: new Date().toISOString(),

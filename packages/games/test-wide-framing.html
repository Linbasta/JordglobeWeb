<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test: Wide Framing Bug</title>
    <style>
        body { margin: 0; overflow: hidden; }
        body.placing-mode { cursor: none; }
        #renderCanvas { width: 100%; height: 100vh; touch-action: none; }
    </style>
</head>

<body>
    <canvas id="renderCanvas"></canvas>
        <!-- Console logger - streams browser console to file for Claude -->
    <script type="module" src="/shared/consoleLogger.ts"></script>
    <script type="module">
        import { startQuizGame } from '/src/solo/start-quiz-game.ts';

        // Load ALL capitals from locations.json — stress test for wide framing
        const resp = await fetch('/locations.json');
        const locationsMap = await resp.json();
        const entries = Object.values(locationsMap);
        console.log(`Loaded ${entries.length} locations — building questions`);

        const questions = entries.map(loc => ({
            present: 'text',
            answer: 'location-alternatives',
            lat: loc.lat,
            lng: loc.lng,
            prompt: loc.name,
        }));

        startQuizGame({
            title: `Wide Framing Test (${questions.length} capitals)`,
            questions,
            shuffle: false,
            onGameComplete: (score, total) => {
                alert(`Done! ${score}/${total}`);
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-itunes-app" content="app-id=1599500931">
    <meta name="theme-color" content="#6496DC">
    <title>Eurovision Quiz - Guess Songs from Eurovision 2026 | JordGlobe</title>
    <!-- SEO - Generated from seo-config.ts -->
    <meta name="description" content="Watch Eurovision Song Contest 2026 entries and guess which country each performance is from on an interactive 3D globe. Test your Eurovision knowledge!">
    <link rel="canonical" href="https://jordglobe.com/games/eurovision/">
    <!-- Open Graph -->
    <meta property="og:title" content="Eurovision 2026 Quiz - Guess the Country from the Song">
    <meta property="og:description" content="Watch Eurovision 2026 performances and guess which country each one is from in this interactive 3D globe quiz.">
    <meta property="og:image" content="https://jordglobe.com/games/eurovision/og-eurovision.jpg">
    <meta property="og:url" content="https://jordglobe.com/games/eurovision/">
    <meta property="og:type" content="website">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Eurovision 2026 Quiz - Guess the Country from the Song">
    <meta name="twitter:description" content="Watch Eurovision 2026 performances and guess which country each one is from in this interactive 3D globe quiz.">
    <meta name="twitter:image" content="https://jordglobe.com/games/eurovision/og-eurovision.jpg">
    <!-- /SEO -->
    <link rel="manifest" href="./eurovision-manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./JordglobeIconSquare.png">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <style>
        html, body { height: 100%; }
        body { margin: 0; overflow: hidden; background-color: #6496DC; }
        body.placing-mode { cursor: none; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>

<body>
    <canvas id="renderCanvas"></canvas>


    <script type="module">
        import { EUROVISION_I18N } from './eurovision.i18n.ts';
        import { t, initI18n } from '/src/shared/i18n/i18n.ts';
        import { initMobile } from '/src/shared/ui/mobile-init.ts';
        import { startQuizGame } from '/src/solo/start-quiz-game.ts';
        import { asset } from '/src/shared/asset-path.ts';

        // Initialize i18n BEFORE any t() call or question assembly
        initI18n(EUROVISION_I18N);
        initMobile();

        // Preload sprite images when browser is idle (not blocking initial load)
        const idleCallback = window.requestIdleCallback || ((cb) => setTimeout(cb, 1));
        idleCallback(() => {
            for (let i = 1; i <= 6; i++) new Image().src = `${import.meta.env.BASE_URL}eurovision/${i}.png`;
        });

        function showStartPanel() {
            return new Promise(resolve => {
                const SCALE_REF_WIDTH = 1800;
                const SCALE_REF_HEIGHT = 1100;
                const MIN_SCALE = 0.35;

                const root = document.createElement('div');
                root.style.cssText =
                    'position:fixed;top:50%;left:50%;z-index:500;' +
                    'transform-origin:center center;' +
                    'filter:drop-shadow(0 10px 24px rgba(0,0,0,0.35));' +
                    'font-family:Arial,sans-serif;';

                const deco = document.createElement('img');
                deco.src = asset('eurovision/eurovison_play_image.png');
                deco.alt = '';
                deco.style.cssText =
                    'position:absolute;left:50%;top:-195px;transform:translateX(-50%);' +
                    'width:520px;height:auto;pointer-events:none;display:block;';

                const card = document.createElement('div');
                card.style.cssText =
                    'position:relative;width:620px;height:240px;border-radius:20px;' +
                    'background:linear-gradient(90deg,#7a4bd0,#e86bb5);' +
                    'display:flex;flex-direction:column;align-items:center;justify-content:center;' +
                    'gap:18px;padding:28px 20px;box-sizing:border-box;overflow:visible;';

                const title = document.createElement('div');
                title.textContent = t('start.title');
                title.style.cssText =
                    'color:#fff;font-size:32px;font-weight:800;letter-spacing:0.5px;' +
                    'text-shadow:0 2px 4px rgba(0,0,0,0.25);';

                const play = document.createElement('button');
                play.textContent = t('start.playButton');
                play.style.cssText =
                    'width:280px;height:112px;border:none;background:transparent;' +
                    `background-image:url('${asset('green_btn.png')}');` +
                    'background-size:contain;background-repeat:no-repeat;background-position:center;' +
                    'color:#fff;font-size:28px;font-weight:800;font-family:inherit;' +
                    'text-shadow:0 2px 3px rgba(0,0,0,0.35);' +
                    'cursor:pointer;padding:0;line-height:1;';

                function onResize() {
                    const s = Math.max(MIN_SCALE, Math.min(
                        1,
                        window.innerWidth / SCALE_REF_WIDTH,
                        window.innerHeight / SCALE_REF_HEIGHT,
                    ));
                    root.style.transform = `translate(-50%,-50%) scale(${s})`;
                }

                play.onclick = () => {
                    window.removeEventListener('resize', onResize);
                    root.remove();
                    resolve();
                };

                card.appendChild(title);
                card.appendChild(play);
                root.appendChild(deco);
                root.appendChild(card);
                document.body.appendChild(root);

                window.addEventListener('resize', onResize);
                onResize();
            });
        }

        function iso2ToFlag(iso2) {
            return [...iso2].map(c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65)).join('');
        }

        // Single compilation video with all Eurovision 2026 entries
        const COMPILATION_VIDEO_ID = '1jnR-m5u5yQ';

        // Global offset: start this many seconds into each song (to skip intros)
        const SONG_OFFSET = 5;

        // Clip duration: how long each clip plays
        const CLIP_DURATION = 22;

        // Helper to parse "MM:SS" to seconds
        function parseTime(timeStr) {
            const [min, sec] = timeStr.split(':').map(Number);
            return min * 60 + sec;
        }

        // [songStartTime, countryISO2, countryName, clipDuration?]
        // Timecodes from the Eurovision 2026 compilation video
        // Optional 4th element overrides CLIP_DURATION for that entry
        const EUROVISION_ENTRIES = [
            ['00:01', 'AL', 'Albania'],
            ['00:31', 'AM', 'Armenia'],
            ['01:00', 'AU', 'Australia'],
            ['01:29', 'AT', 'Austria'],
            ['01:58', 'AZ', 'Azerbaijan'],
            ['02:25', 'BE', 'Belgium'],
            ['02:53', 'BG', 'Bulgaria'],
            ['03:24', 'HR', 'Croatia'],
            ['03:55', 'CY', 'Cyprus'],
            ['04:24', 'CZ', 'Czech Republic'],
            ['04:56', 'DK', 'Denmark'],
            ['05:26', 'EE', 'Estonia'],
            ['05:54', 'FI', 'Finland'],
            ['06:26', 'FR', 'France'],
            ['06:55', 'GE', 'Georgia'],
            ['07:24', 'DE', 'Germany'],
            ['07:56', 'GR', 'Greece'],
            ['08:28', 'IL', 'Israel'],
            ['08:59', 'IT', 'Italy'],
            ['09:28', 'LV', 'Latvia'],
            ['09:57', 'LT', 'Lithuania'],
            ['10:29', 'LU', 'Luxembourg'],
            ['11:03', 'MT', 'Malta'],
            ['11:32', 'MD', 'Moldova'],
            ['12:01', 'ME', 'Montenegro'],
            ['12:31', 'NO', 'Norway'],
            ['13:00', 'PL', 'Poland'],
            ['13:30', 'PT', 'Portugal'],
            ['13:58', 'RO', 'Romania'],
            ['14:29', 'SM', 'San Marino'],
            ['14:59', 'RS', 'Serbia'],
            ['15:29', 'SE', 'Sweden'],
            ['15:59', 'CH', 'Switzerland'],
            ['16:28', 'UA', 'Ukraine'],
            ['17:00', 'GB', 'United Kingdom'],
        ];

        const EUROVISION_QUESTIONS = EUROVISION_ENTRIES.map(([timeStr, iso2, countryName, duration]) => {
            const songStart = parseTime(timeStr);
            const clipLen = duration ?? CLIP_DURATION;
            return {
                present: 'video',
                answer: 'country',
                countryISO2: iso2,
                youtubeId: COMPILATION_VIDEO_ID,
                prompt: t('question.prompt'),
                startTime: songStart + SONG_OFFSET,
                endTime: songStart + SONG_OFFSET + clipLen,
                hideBottom: true,  // Hide country name overlay in compilation
            };
        });

        startQuizGame({
            i18n: EUROVISION_I18N,
            questions: EUROVISION_QUESTIONS,
            scoreBarType: 'simple',
            showHoverLabel: true,
            quizId: 'eurovision',
            analyticsGame: 'Eurovision',
            analyticsGameId: 'eurovision_2026',
            onReady: () => showStartPanel(),
            onGameComplete: async (score, total, elapsedMs, results, isPersonalBest) => {
                // Dynamic imports - only load when game ends
                const [{ showResultOverlay }, { getQuestions }] = await Promise.all([
                    import('/src/shared/ui/result-overlay.ts'),
                    import('/src/shared/quiz/quiz-runner.ts'),
                ]);

                // Submit score and check for world record
                let isNewRecord = false;
                try {
                    const { postRecord } = await import('/src/shared/firestore-records.ts');
                    const data = await postRecord('eurovision', score, total, elapsedMs);
                    isNewRecord = data.isNewRecord;
                } catch (e) {
                    console.warn('Failed to submit record:', e);
                }
                const spriteNames = [0, 1, 2, 3, 4, 5].map(i => t(`sprite.${i}`));
                showResultOverlay({
                    score, total, elapsedMs, results,
                    quizTitle: t('quiz.title'),
                    shareUrl: 'https://eurovision.jordglobe.com/',
                    shareEmoji: '🎵',
                    spritePath: `${import.meta.env.BASE_URL}eurovision/`,
                    spriteNames,
                    getMessage: (s, t) => s === t ? spriteNames[5] : spriteNames[Math.max(0, Math.min(4, Math.ceil((s / t) * 5) - 1))],
                    formatShareSquares: (results) => {
                        const qs = getQuestions();
                        return results.map((correct, i) => correct ? iso2ToFlag(qs[i].countryISO2) : '🟥').join('');
                    },
                    isNewRecord,
                    isPersonalBest,
                    onRetry: () => window.location.reload(),
                })
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marker Particles Test</title>
    <style>
      body { margin: 0; padding: 0; overflow: hidden; }
      #renderCanvas { width: 100%; height: 100vh; touch-action: none; }
      #panel {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.85);
        color: white;
        padding: 15px;
        border-radius: 8px;
        font-family: monospace;
        font-size: 13px;
        width: 280px;
        max-height: 90vh;
        overflow-y: auto;
      }
      #panel h3 { margin: 0 0 10px 0; }
      .row { margin: 6px 0; display: flex; align-items: center; justify-content: space-between; }
      .row label { flex: 1; }
      .row input[type="range"] { width: 120px; }
      .row .val { width: 60px; text-align: right; font-size: 11px; color: #aaa; }
      button {
        width: 100%;
        padding: 8px;
        margin: 4px 0;
        background: #2a6;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-family: monospace;
        font-size: 13px;
      }
      button:hover { background: #3b7; }
      button.secondary { background: #555; }
      button.secondary:hover { background: #777; }
      hr { border: none; border-top: 1px solid #444; margin: 10px 0; }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="panel">
      <h3>Particle Burst Tuner</h3>
      <p style="color:#aaa;font-size:11px;">Click "Burst" or press Space to fire at Stockholm marker</p>
      <button id="burstBtn">Burst!</button>
      <button id="burstAllBtn" class="secondary">Burst All Markers</button>
      <hr>
      <div class="row"><label>count</label><input type="range" id="count" min="5" max="200" step="5" value="50"><span class="val" id="countVal"></span></div>
      <div class="row"><label>lifetimeMin</label><input type="range" id="lifetimeMin" min="0.02" max="2.0" step="0.01" value="0.05"><span class="val" id="lifetimeMinVal"></span></div>
      <div class="row"><label>lifetimeMax</label><input type="range" id="lifetimeMax" min="0.02" max="2.0" step="0.01" value="0.1"><span class="val" id="lifetimeMaxVal"></span></div>
      <div class="row"><label>emitDurationMs</label><input type="range" id="emitDurationMs" min="5" max="500" step="5" value="20"><span class="val" id="emitDurationMsVal"></span></div>
      <div class="row"><label>minEmitPower</label><input type="range" id="minEmitPower" min="0.01" max="2.0" step="0.01" value="0.04"><span class="val" id="minEmitPowerVal"></span></div>
      <div class="row"><label>maxEmitPower</label><input type="range" id="maxEmitPower" min="0.01" max="2.0" step="0.01" value="0.12"><span class="val" id="maxEmitPowerVal"></span></div>
      <div class="row"><label>spread</label><input type="range" id="spread" min="0.01" max="1.0" step="0.01" value="0.08"><span class="val" id="spreadVal"></span></div>
      <div class="row"><label>sizeMin</label><input type="range" id="sizeMin" min="0.0001" max="0.05" step="0.0001" value="0.0002"><span class="val" id="sizeMinVal"></span></div>
      <div class="row"><label>sizeMax</label><input type="range" id="sizeMax" min="0.0001" max="0.05" step="0.0001" value="0.0008"><span class="val" id="sizeMaxVal"></span></div>
      <div class="row"><label>sizePeak</label><input type="range" id="sizePeak" min="0.0001" max="0.05" step="0.0001" value="0.001"><span class="val" id="sizePeakVal"></span></div>
      <div class="row"><label>gravity</label><input type="range" id="gravity" min="-2.0" max="2.0" step="0.01" value="-0.15"><span class="val" id="gravityVal"></span></div>
      <hr>
      <button id="copyBtn" class="secondary">Copy Settings to Clipboard</button>
    </div>
        <script type="module" src="/src/tests/test-marker-particles.ts"></script>
  </body>
</html>

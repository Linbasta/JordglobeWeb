<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Card Quiz Test</title>
    <style>
        body { margin: 0; overflow: hidden; }
        body.placing-mode { cursor: none; }
        #renderCanvas { width: 100%; height: 100vh; touch-action: none; }
    </style>
</head>

<body>
    <canvas id="renderCanvas"></canvas>


    <script type="module">
        import { startQuizGame } from '/src/solo/start-quiz-game.ts';

        const TEXTCARD_QUESTIONS = [
            {
                present: 'textcard',
                answer: 'country',
                prompt: 'This Nordic country is known for its stunning fjords, the Northern Lights, and being one of the happiest countries in the world. Its capital hosted the 1952 Winter Olympics.',
                countryISO2: 'NO',
            },
        ];

        startQuizGame({
            title: 'Loading Text Card Quiz',
            questions: TEXTCARD_QUESTIONS,
            onGameComplete: (score, total) => {
                alert(`Text Card Quiz Complete!\n\nScore: ${score}/${total}\n\nReload page to play again!`);
            }
        });
    </script>
</body>

</html>

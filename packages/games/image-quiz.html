<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-itunes-app" content="app-id=1599500931">
    <meta name="theme-color" content="#6496DC">
    <title>Image Quiz Game</title>
    <style>
        html, body { height: 100%; }
        body { margin: 0; overflow: hidden; background-color: #6496DC; }
        body.placing-mode { cursor: none; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>

<body>
    <canvas id="renderCanvas"></canvas>


    <script type="module">
        import { initMobile } from '/src/shared/ui/mobile-init.ts';
        import { startQuizGame } from '/src/solo/start-quiz-game.ts';
        initMobile();

        const IMAGE_QUESTIONS = [
            {
                present: 'image',
                answer: 'location-guess',
                imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Ford_World_Headquarters_from_sidewalk%2C_against_sun.jpg/500px-Ford_World_Headquarters_from_sidewalk%2C_against_sun.jpg',
                prompt: 'Where is Fords world HQ located?',
                lat: 42.3133,
                lng: -83.2113,
                locationName: 'Dearborn, Michigan',
                imageCredit: 'Photo: Dwight Burdette, CC BY 3.0, Wikimedia Commons',
            },
        ];

        startQuizGame({
            title: 'Loading Image Quiz',
            questions: IMAGE_QUESTIONS,
            onGameComplete: (score, total) => {
                alert(`Image Quiz Complete!\n\nScore: ${score}/${total}\n\nReload page to play again!`);
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-itunes-app" content="app-id=1599500931">
    <title>Eurovision Quiz</title>
    <style>
        body { margin: 0; overflow: hidden; }
        body.placing-mode { cursor: none; }
        #renderCanvas { width: 100%; height: 100vh; touch-action: none; }
    </style>
</head>

<body>
    <canvas id="renderCanvas"></canvas>

    <!-- Console logger - streams browser console to file for Claude -->
    <script type="module" src="/shared/consoleLogger.ts"></script>

    <script type="module">
        import { initAppBanner } from '/src/shared/ui/app-banner.ts';
        import { startQuizGame } from '/src/solo/start-quiz-game.ts';
        initAppBanner();

        function showStartButton() {
            return new Promise(resolve => {
                const btn = document.createElement('button');
                btn.textContent = 'Start Eurovision Quiz';
                btn.style.cssText =
                    'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:500;' +
                    'padding:16px 56px;font-size:24px;font-weight:700;font-family:Arial,sans-serif;' +
                    'color:#fff;background:linear-gradient(90deg,#E91E63,#9C27B0);' +
                    'border:none;border-radius:8px;cursor:pointer;' +
                    'box-shadow:0 4px 16px rgba(156,39,176,0.4);';
                btn.onclick = () => { btn.remove(); resolve(); };
                document.body.appendChild(btn);
            });
        }

        // Single compilation video with all Eurovision 2025 entries
        const COMPILATION_VIDEO_ID = '1jnR-m5u5yQ';

        // Global offset: start this many seconds into each song (to skip intros)
        const SONG_OFFSET = 5;

        // Clip duration: how long each clip plays
        const CLIP_DURATION = 25;

        // Helper to parse "MM:SS" to seconds
        function parseTime(timeStr) {
            const [min, sec] = timeStr.split(':').map(Number);
            return min * 60 + sec;
        }

        // [songStartTime, countryISO2, countryName]
        // Timecodes from the Eurovision 2025 compilation video
        const EUROVISION_ENTRIES = [
            ['00:00', 'AL', 'Albania'],
            ['00:31', 'AM', 'Armenia'],
            ['01:00', 'AU', 'Australia'],
            ['01:29', 'AT', 'Austria'],
            ['01:58', 'AZ', 'Azerbaijan'],
            ['02:25', 'BE', 'Belgium'],
            ['02:53', 'BG', 'Bulgaria'],
            ['03:24', 'HR', 'Croatia'],
            ['03:55', 'CY', 'Cyprus'],
            ['04:24', 'CZ', 'Czech Republic'],
            ['04:56', 'DK', 'Denmark'],
            ['05:26', 'EE', 'Estonia'],
            ['05:54', 'FI', 'Finland'],
            ['06:26', 'FR', 'France'],
            ['06:55', 'GE', 'Georgia'],
            ['07:24', 'DE', 'Germany'],
            ['07:56', 'GR', 'Greece'],
            ['08:28', 'IL', 'Israel'],
            ['08:59', 'IT', 'Italy'],
            ['09:28', 'LV', 'Latvia'],
            ['09:57', 'LT', 'Lithuania'],
            ['10:29', 'LU', 'Luxembourg'],
            ['11:03', 'MT', 'Malta'],
            ['11:32', 'MD', 'Moldova'],
            ['12:01', 'ME', 'Montenegro'],
            ['12:31', 'NO', 'Norway'],
            ['13:00', 'PL', 'Poland'],
            ['13:30', 'PT', 'Portugal'],
            ['13:58', 'RO', 'Romania'],
            ['14:29', 'SM', 'San Marino'],
            ['14:59', 'RS', 'Serbia'],
            ['15:29', 'SE', 'Sweden'],
            ['15:59', 'CH', 'Switzerland'],
            ['16:28', 'UA', 'Ukraine'],
            ['17:00', 'GB', 'United Kingdom'],
        ];

        const EUROVISION_QUESTIONS = EUROVISION_ENTRIES.map(([timeStr, iso2, countryName]) => {
            const songStart = parseTime(timeStr);
            return {
                present: 'video',
                answer: 'country',
                countryISO2: iso2,
                youtubeId: COMPILATION_VIDEO_ID,
                prompt: 'Which country does this song represent?',
                startTime: songStart + SONG_OFFSET,
                endTime: songStart + SONG_OFFSET + CLIP_DURATION,
                hideBottom: true,  // Hide country name overlay in compilation
            };
        });

        startQuizGame({
            title: 'Loading Eurovision Quiz',
            questions: EUROVISION_QUESTIONS,
            onReady: () => showStartButton(),
            onGameComplete: (score, total) => {
                alert(`Eurovision Quiz Complete!\n\nScore: ${score}/${total}\n\nReload page to play again!`);
            }
        });
    </script>
</body>

</html>

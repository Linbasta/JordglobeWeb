<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-itunes-app" content="app-id=1599500931">
    <meta name="theme-color" content="#6496DC">
    <title>Eurovision Quiz</title>
    <link rel="manifest" href="/eurovision-manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/JordglobeIconSquare.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <style>
        html, body { height: 100%; }
        body { margin: 0; overflow: hidden; background-color: #6496DC; }
        body.placing-mode { cursor: none; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>

<body>
    <canvas id="renderCanvas"></canvas>

    <!-- Console logger - streams browser console to file for Claude -->
    <script type="module" src="/shared/consoleLogger.ts"></script>

    <script type="module">
        import { initMobile } from '/src/shared/ui/mobile-init.ts';
        import { startQuizGame } from '/src/solo/start-quiz-game.ts';
        import { showResultOverlay } from '/src/shared/ui/result-overlay.ts';
        initMobile();

        // Preload sprite images so they're cached when the result overlay shows
        for (let i = 1; i <= 6; i++) new Image().src = `/eurovision/${i}.png`;

        function showStartButton() {
            return new Promise(resolve => {
                const btn = document.createElement('button');
                btn.textContent = 'Start Eurovision Quiz';
                btn.style.cssText =
                    'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:500;' +
                    'padding:16px 56px;font-size:24px;font-weight:700;font-family:Arial,sans-serif;' +
                    'color:#fff;background:linear-gradient(90deg,#E91E63,#9C27B0);' +
                    'border:none;border-radius:8px;cursor:pointer;' +
                    'box-shadow:0 4px 16px rgba(156,39,176,0.4);';
                btn.onclick = () => { btn.remove(); resolve(); };
                document.body.appendChild(btn);
            });
        }

        // Single compilation video with all Eurovision 2025 entries
        const COMPILATION_VIDEO_ID = '1jnR-m5u5yQ';

        // Global offset: start this many seconds into each song (to skip intros)
        const SONG_OFFSET = 5;

        // Clip duration: how long each clip plays
        const CLIP_DURATION = 22;

        // Helper to parse "MM:SS" to seconds
        function parseTime(timeStr) {
            const [min, sec] = timeStr.split(':').map(Number);
            return min * 60 + sec;
        }

        // [songStartTime, countryISO2, countryName, clipDuration?]
        // Timecodes from the Eurovision 2025 compilation video
        // Optional 4th element overrides CLIP_DURATION for that entry
        const EUROVISION_ENTRIES = [
            ['00:01', 'AL', 'Albania'],
            ['00:31', 'AM', 'Armenia'],
            ['01:00', 'AU', 'Australia'],
            ['01:29', 'AT', 'Austria'],
            ['01:58', 'AZ', 'Azerbaijan'],
            ['02:25', 'BE', 'Belgium'],
            ['02:53', 'BG', 'Bulgaria'],
            ['03:24', 'HR', 'Croatia'],
            ['03:55', 'CY', 'Cyprus'],
            ['04:24', 'CZ', 'Czech Republic'],
            ['04:56', 'DK', 'Denmark'],
            ['05:26', 'EE', 'Estonia'],
            ['05:54', 'FI', 'Finland'],
            ['06:26', 'FR', 'France'],
            ['06:55', 'GE', 'Georgia'],
            ['07:24', 'DE', 'Germany'],
            ['07:56', 'GR', 'Greece'],
            ['08:28', 'IL', 'Israel'],
            ['08:59', 'IT', 'Italy'],
            ['09:28', 'LV', 'Latvia'],
            ['09:57', 'LT', 'Lithuania'],
            ['10:29', 'LU', 'Luxembourg'],
            ['11:03', 'MT', 'Malta'],
            ['11:32', 'MD', 'Moldova'],
            ['12:01', 'ME', 'Montenegro'],
            ['12:31', 'NO', 'Norway'],
            ['13:00', 'PL', 'Poland'],
            ['13:30', 'PT', 'Portugal'],
            ['13:58', 'RO', 'Romania'],
            ['14:29', 'SM', 'San Marino'],
            ['14:59', 'RS', 'Serbia'],
            ['15:29', 'SE', 'Sweden'],
            ['15:59', 'CH', 'Switzerland'],
            ['16:28', 'UA', 'Ukraine'],
            ['17:00', 'GB', 'United Kingdom'],
        ];

        const EUROVISION_QUESTIONS = EUROVISION_ENTRIES.map(([timeStr, iso2, countryName, duration]) => {
            const songStart = parseTime(timeStr);
            const clipLen = duration ?? CLIP_DURATION;
            return {
                present: 'video',
                answer: 'country',
                countryISO2: iso2,
                youtubeId: COMPILATION_VIDEO_ID,
                prompt: 'Which country does this song represent?',
                startTime: songStart + SONG_OFFSET,
                endTime: songStart + SONG_OFFSET + clipLen,
                hideBottom: true,  // Hide country name overlay in compilation
            };
        });

        startQuizGame({
            title: 'Loading Eurovision Quiz',
            questions: EUROVISION_QUESTIONS,
            scoreBarType: 'simple',
            showHoverLabel: true,
            onReady: () => showStartButton(),
            onGameComplete: async (score, total, elapsedMs, results) => {
                // Submit score and check for world record
                let isNewRecord = false;
                try {
                    const res = await fetch('/api/record', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ quiz_id: 'eurovision', score, total, elapsed_ms: elapsedMs }),
                    });
                    const data = await res.json();
                    isNewRecord = data.isNewRecord;
                } catch (e) {
                    console.warn('Failed to submit record:', e);
                }
                const spriteNames = ['Nul Points', 'Mildly Aware', 'Semi-Curious', 'Eurovision Lover', 'Devoted Fan', 'Eurovision God'];
                showResultOverlay({
                    score, total, elapsedMs, results,
                    quizTitle: 'Eurovision Quiz',
                    shareUrl: 'https://jordglobe.com/eurovision',
                    shareEmoji: '🎵',
                    spritePath: '/eurovision/',
                    spriteNames,
                    getMessage: (s, t) => spriteNames[Math.max(0, Math.min(5, Math.ceil((s / t) * 6) - 1))],
                    isNewRecord,
                    onRetry: () => window.location.reload(),
                })
            }
        });
    </script>
</body>

</html>

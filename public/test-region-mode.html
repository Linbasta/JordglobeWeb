<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test: Region Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: monospace; }
        #renderCanvas { width: 100vw; height: 100vh; display: block; }

        #ui {
            position: fixed;
            top: 16px;
            left: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        button {
            padding: 8px 16px;
            font-family: monospace;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #888;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
        }
        button:hover { background: rgba(40, 40, 40, 0.9); }
        button:disabled { opacity: 0.4; cursor: default; }

        #status {
            padding: 6px 10px;
            font-size: 12px;
            color: #ccc;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 4px;
            border: 1px solid #444;
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>

    <div id="ui">
        <button id="btnEnter" disabled>Enter US region mode</button>
        <button id="btnExit" disabled>Exit region mode</button>
        <div id="status">Initializing…</div>
    </div>

        <!-- Console logger - streams browser console to file for Claude -->
    <script type="module" src="/shared/consoleLogger.ts"></script>
    <script type="module">
        import { EarthGlobe } from '/src/earth-globe/index.ts';

        const btnEnter = document.getElementById('btnEnter');
        const btnExit  = document.getElementById('btnExit');
        const statusEl = document.getElementById('status');

        function setStatus(text) {
            statusEl.textContent = text;
        }

        const globe = new EarthGlobe({
            canvasId: 'renderCanvas',
            onReady: (g) => {
                setStatus('Globe ready — waiting for provinces…');

                // Expose globally for DevTools access
                window.globe = g;

                btnEnter.disabled = false;
                btnEnter.addEventListener('click', async () => {
                    await g.enterRegionMode('US');

                    // Animate each state to a random altitude so they're visually distinct
                    const regions = g.getAllActiveRegions();
                    for (const region of regions) {
                        const target = 0.2 + Math.random() * 0.8;  // 0.2 – 1.0
                        g.animateActiveRegionAltitude(region.index, target, 800 + Math.random() * 400);
                    }

                    setStatus(`Region mode: US (${regions.length} states, random altitudes)`);
                    btnEnter.disabled = true;
                    btnExit.disabled = false;
                });

                btnExit.addEventListener('click', () => {
                    g.exitRegionMode();
                    setStatus('Country mode');
                    btnExit.disabled = true;
                    btnEnter.disabled = false;
                });

                // Update status when provinces finish loading
                // Check periodically since loadProvinces is non-blocking
                const pollInterval = setInterval(() => {
                    if (g.isInRegionMode()) return; // don't interrupt active mode
                    const ready = g.isReady();
                    if (ready) {
                        setStatus('Ready — click "Enter US region mode"');
                        clearInterval(pollInterval);
                    }
                }, 500);
            }
        });
    </script>
    <script type="module" src="/shared/consoleLogger.ts"></script>
</body>
</html>

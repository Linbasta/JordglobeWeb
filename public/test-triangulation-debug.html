<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Debug: Province Triangulation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #eee; font-family: monospace; }

        #layout {
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 340px;
            padding: 12px;
            overflow-y: auto;
            background: #16213e;
            border-right: 1px solid #333;
            flex-shrink: 0;
        }

        #canvasWrap {
            flex: 1;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        h2 { font-size: 14px; margin-bottom: 8px; color: #0f3460; background: #e0e0e0; padding: 4px 8px; border-radius: 3px; }
        h3 { font-size: 12px; margin: 8px 0 4px; color: #aaa; }

        .ring-item {
            padding: 4px 8px;
            margin: 2px 0;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            border: 1px solid transparent;
        }
        .ring-item:hover { background: rgba(255,255,255,0.1); }
        .ring-item.selected { border-color: #0f3460; background: rgba(15,52,96,0.3); }
        .ring-item.empty { color: #666; cursor: default; }
        .ring-item .badge {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 2px;
            font-size: 10px;
            margin-left: 4px;
        }
        .badge-ok { background: #1b4332; color: #52b788; }
        .badge-warn { background: #5c3d0e; color: #e9c46a; }
        .badge-err { background: #5c0e0e; color: #e76f51; }

        #stats {
            font-size: 11px;
            line-height: 1.6;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            margin-top: 8px;
        }
        #stats .label { color: #888; }
        #stats .val { color: #e0e0e0; }
        #stats .good { color: #52b788; }
        #stats .bad { color: #e76f51; }

        #gapDetails {
            font-size: 10px;
            line-height: 1.5;
            padding: 8px;
            background: rgba(80,0,80,0.2);
            border: 1px solid #5c0e5c;
            border-radius: 4px;
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        #gapDetails .gap-edge { color: #f72585; }

        #legend {
            font-size: 10px;
            margin-top: 12px;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }
        #legend div { margin: 2px 0; }
        .swatch {
            display: inline-block;
            width: 12px; height: 12px;
            border-radius: 2px;
            vertical-align: middle;
            margin-right: 4px;
        }

        select, button {
            font-family: monospace;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 3px;
            border: 1px solid #444;
            background: #0a0a1a;
            color: #eee;
            cursor: pointer;
        }
        select { width: 100%; margin-bottom: 8px; }
        button { margin: 2px; }
        button:hover { background: #1a1a3e; }

        #controls { margin-bottom: 12px; }

        #tooltip {
            position: fixed;
            padding: 4px 8px;
            background: rgba(0,0,0,0.85);
            color: #eee;
            font-size: 11px;
            border-radius: 3px;
            pointer-events: none;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="layout">
        <div id="sidebar">
            <h2>Province Triangulation Debug</h2>

            <div id="controls">
                <label style="font-size:11px; color:#888;">Country:</label>
                <select id="countrySelect">
                    <option value="CA">Canada (CA)</option>
                    <option value="US">United States (US)</option>
                </select>

                <label style="font-size:11px; color:#888;">Province:</label>
                <select id="provinceSelect"></select>

                <div style="margin-top:8px;">
                    <button id="btnShowAll">All rings</button>
                    <button id="btnToggleFiltered">Toggle filtered-out</button>
                    <button id="btnToggleSteiner">Toggle Steiner pts</button>
                    <button id="btnToggleLabels">Toggle vertex labels</button>
                    <button id="btnToggleGaps">Toggle gap edges</button>
                    <button id="btnToggleAllCDT">Toggle all CDT edges</button>
                </div>

                <div style="margin-top:8px;">
                    <button id="btnToggleClean" style="background:#1b4332">Clean polygons: ON</button>
                </div>

                <h3>Steiner Point Mode</h3>
                <div style="display:flex; gap:4px; flex-wrap:wrap;">
                    <button id="btnSteinerAll" style="background:#1b4332">All (default)</button>
                    <button id="btnSteinerNone">None</button>
                    <button id="btnSteinerSafe">Safe only</button>
                </div>
                <div style="margin-top:4px;">
                    <label style="font-size:11px; color:#888;">Min dist to edge (deg):</label>
                    <input id="minDistInput" type="number" value="0.5" step="0.1" min="0" max="5"
                        style="width:60px; font-family:monospace; font-size:12px; padding:2px 4px;
                               background:#0a0a1a; color:#eee; border:1px solid #444; border-radius:3px;">
                </div>
            </div>

            <h3>Rings</h3>
            <div id="ringList"></div>

            <div id="stats"></div>
            <div id="gapDetails"></div>

            <div id="legend">
                <div><span class="swatch" style="background:#52b788"></span> Kept triangle (inside boundary)</div>
                <div><span class="swatch" style="background:#e76f51"></span> Filtered-out triangle (centroid outside)</div>
                <div><span class="swatch" style="background:#e9c46a"></span> Boundary polygon edges</div>
                <div><span class="swatch" style="background:#7209b7"></span> Steiner points</div>
                <div><span class="swatch" style="background:#f72585"></span> Gap edges (missing triangles)</div>
                <div><span class="swatch" style="background:rgba(255,255,255,0.15)"></span> All CDT edges (wireframe)</div>
            </div>
        </div>

        <div id="canvasWrap">
            <canvas id="debugCanvas"></canvas>
        </div>
    </div>

    <div id="tooltip"></div>

    <script type="module" src="/shared/consoleLogger.ts"></script>
    <script type="module">
        import cdt2d, { pointInPolygon, triangleCentroid, filterTriangles } from '/src/earth-globe/triangulation.ts';
        import { generateInteriorPoints, pointInPolygon2D } from '/src/earth-globe/geo-math.ts';

        const GRID_SPACING = 5; // matches TRIANGULATION_GRID_SPACING

        const canvas = document.getElementById('debugCanvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const statsEl = document.getElementById('stats');
        const gapDetailsEl = document.getElementById('gapDetails');
        const ringListEl = document.getElementById('ringList');
        const countrySelect = document.getElementById('countrySelect');
        const provinceSelect = document.getElementById('provinceSelect');

        let provinceData = null;
        let currentRings = [];
        let selectedRingIdx = -1;
        let showFilteredOut = false;
        let showSteiner = true;
        let showLabels = true;
        let showGaps = true;
        let showAllCDTEdges = true;

        // 'all' | 'none' | 'safe'
        let steinerMode = 'all';
        let minDistToEdge = 0.5; // degrees

        let ringAnalysis = [];

        // View transform
        let viewOffX = 0, viewOffY = 0, viewScale = 1;

        // ----------------------------------------------------------------
        // Data loading
        // ----------------------------------------------------------------

        async function loadCountry(iso2) {
            const resp = await fetch(`/provinces/${iso2}.json`);
            provinceData = await resp.json();

            provinceSelect.innerHTML = '';
            for (const p of provinceData.provinces) {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = `${p.id}: ${p.name}`;
                provinceSelect.appendChild(opt);
            }

            if (iso2 === 'CA') {
                const nwt = provinceData.provinces.find(p => p.name === 'Northwest Territories');
                if (nwt) provinceSelect.value = nwt.id;
            }

            selectProvince();
        }

        function selectProvince() {
            const id = parseInt(provinceSelect.value);
            const prov = provinceData.provinces.find(p => p.id === id);
            if (!prov) return;

            currentRings = JSON.parse(prov.paths);
            selectedRingIdx = -1;

            analyzeRings();
            buildRingList();
            fitView();
            draw();
        }

        // ----------------------------------------------------------------
        // Edge key helper
        // ----------------------------------------------------------------

        function edgeKey(a, b) {
            return a < b ? `${a}-${b}` : `${b}-${a}`;
        }

        // ----------------------------------------------------------------
        // Gap detection: find internal edges adjacent to only 1 triangle
        // ----------------------------------------------------------------

        function detectGaps(vertices, allTriangles, constraintEdges, boundaryPoly) {
            // Build edge → triangle count map from ALL CDT triangles
            const edgeTriCount = new Map();
            for (const tri of allTriangles) {
                const edges = [
                    edgeKey(tri[0], tri[1]),
                    edgeKey(tri[1], tri[2]),
                    edgeKey(tri[2], tri[0]),
                ];
                for (const ek of edges) {
                    edgeTriCount.set(ek, (edgeTriCount.get(ek) || 0) + 1);
                }
            }

            // Build constraint edge set
            const constraintSet = new Set();
            for (const [a, b] of constraintEdges) {
                constraintSet.add(edgeKey(a, b));
            }

            // Internal gap edges: used by only 1 triangle, NOT a constraint edge,
            // and midpoint is inside the boundary
            const gapEdges = [];
            for (const [ek, count] of edgeTriCount) {
                if (count !== 1) continue;
                if (constraintSet.has(ek)) continue;

                const [aStr, bStr] = ek.split('-');
                const a = parseInt(aStr), b = parseInt(bStr);
                const midX = (vertices[a][0] + vertices[b][0]) / 2;
                const midY = (vertices[a][1] + vertices[b][1]) / 2;

                if (pointInPolygon([midX, midY], boundaryPoly)) {
                    gapEdges.push({ a, b, vA: vertices[a], vB: vertices[b] });
                }
            }

            return gapEdges;
        }

        // ----------------------------------------------------------------
        // Collect all CDT edges for wireframe display
        // ----------------------------------------------------------------

        function collectAllEdges(vertices, allTriangles) {
            const edgeSet = new Set();
            const edges = [];
            for (const tri of allTriangles) {
                const pairs = [[tri[0], tri[1]], [tri[1], tri[2]], [tri[2], tri[0]]];
                for (const [a, b] of pairs) {
                    const ek = edgeKey(a, b);
                    if (!edgeSet.has(ek)) {
                        edgeSet.add(ek);
                        edges.push([vertices[a], vertices[b]]);
                    }
                }
            }
            return edges;
        }

        // ----------------------------------------------------------------
        // Polygon cleaning (same logic as region-renderer.ts)
        // ----------------------------------------------------------------

        const CLEAN_EPS = 1e-10;

        function samePoint(a, b) {
            return Math.abs(a[0] - b[0]) < CLEAN_EPS && Math.abs(a[1] - b[1]) < CLEAN_EPS;
        }

        function cleanRing(points) {
            let arr = points.slice();
            let changed = true;
            while (changed) {
                changed = false;
                const deduped = [];
                for (let i = 0; i < arr.length; i++) {
                    if (deduped.length === 0 || !samePoint(arr[i], deduped[deduped.length - 1])) {
                        deduped.push(arr[i]);
                    }
                }
                while (deduped.length > 1 && samePoint(deduped[deduped.length - 1], deduped[0])) {
                    deduped.pop();
                }
                if (deduped.length !== arr.length) changed = true;
                arr = deduped;
                if (arr.length < 3) break;
                for (let i = 0; i < arr.length; i++) {
                    const next1 = (i + 1) % arr.length;
                    const next2 = (i + 2) % arr.length;
                    if (samePoint(arr[i], arr[next2])) {
                        const remove = new Set([next1, next2]);
                        arr = arr.filter((_, idx) => !remove.has(idx));
                        changed = true;
                        break;
                    }
                }
            }
            return arr;
        }

        let applyClean = true;

        // ----------------------------------------------------------------
        // Point-to-segment distance
        // ----------------------------------------------------------------

        function pointToSegmentDist(px, py, ax, ay, bx, by) {
            const dx = bx - ax, dy = by - ay;
            const lenSq = dx * dx + dy * dy;
            if (lenSq === 0) return Math.hypot(px - ax, py - ay);
            let t = ((px - ax) * dx + (py - ay) * dy) / lenSq;
            t = Math.max(0, Math.min(1, t));
            const projX = ax + t * dx;
            const projY = ay + t * dy;
            return Math.hypot(px - projX, py - projY);
        }

        function minDistToBoundary(px, py, boundary) {
            let minD = Infinity;
            for (let i = 0; i < boundary.length; i++) {
                const j = (i + 1) % boundary.length;
                const d = pointToSegmentDist(px, py, boundary[i][0], boundary[i][1], boundary[j][0], boundary[j][1]);
                if (d < minD) minD = d;
            }
            return minD;
        }

        // ----------------------------------------------------------------
        // Triangulation analysis
        // ----------------------------------------------------------------

        function analyzeRings() {
            ringAnalysis = [];

            for (let ri = 0; ri < currentRings.length; ri++) {
                const ring = currentRings[ri];
                const entry = {
                    ringIdx: ri,
                    pointCount: ring.length,
                    status: 'ok',
                    statusMsg: '',
                    boundary: [],
                    steinerPts: [],
                    keptTris: [],
                    filteredTris: [],
                    allVertices: [],
                    allTriangles: [],
                    constraintEdges: [],
                    gapEdges: [],
                    allCDTEdges: [],
                    bbox: null,
                    numBoundaryVerts: 0,
                };

                if (ring.length === 0) {
                    entry.status = 'empty';
                    entry.statusMsg = 'Empty ring';
                    ringAnalysis.push(entry);
                    continue;
                }

                let hasLargeJump = false;
                for (let i = 1; i < ring.length; i++) {
                    if (Math.abs(ring[i][1] - ring[i - 1][1]) > 180) {
                        hasLargeJump = true;
                        break;
                    }
                }
                if (hasLargeJump) {
                    entry.status = 'skip';
                    entry.statusMsg = 'Antimeridian jump - skipped';
                    ringAnalysis.push(entry);
                    continue;
                }

                if (ring.length < 3) {
                    entry.status = 'degenerate';
                    entry.statusMsg = `Only ${ring.length} point(s)`;
                    ringAnalysis.push(entry);
                    continue;
                }

                // Apply polygon cleaning
                const rawRing = ring;
                const usedRing = applyClean ? cleanRing(ring) : ring;
                const removedCount = rawRing.length - usedRing.length;
                if (removedCount > 0) {
                    entry.statusMsg = `cleaned: ${removedCount} verts removed`;
                }
                entry.pointCount = usedRing.length;

                if (usedRing.length < 3) {
                    entry.status = 'degenerate';
                    entry.statusMsg = `${rawRing.length} → ${usedRing.length} after clean`;
                    ringAnalysis.push(entry);
                    continue;
                }

                const latLonPoints = usedRing.map(p => ({ lat: p[0], lon: p[1] }));
                const points2D = latLonPoints.map(p => ({ x: p.lon, y: p.lat }));
                entry.boundary = points2D.map(p => [p.x, p.y]);
                entry.numBoundaryVerts = points2D.length;

                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                for (const p of points2D) {
                    minX = Math.min(minX, p.x);
                    maxX = Math.max(maxX, p.x);
                    minY = Math.min(minY, p.y);
                    maxY = Math.max(maxY, p.y);
                }
                entry.bbox = { minX, maxX, minY, maxY };

                // Generate all Steiner points
                const allSteinerLatLon = generateInteriorPoints(latLonPoints, undefined, GRID_SPACING);
                const allSteiner2D = allSteinerLatLon.map(p => ({ x: p.lon, y: p.lat }));

                // Filter Steiner points based on mode
                let usedSteiner2D = [];
                const rejectedSteiner = [];

                if (steinerMode === 'all') {
                    usedSteiner2D = allSteiner2D;
                } else if (steinerMode === 'none') {
                    usedSteiner2D = [];
                    rejectedSteiner.push(...allSteiner2D);
                } else if (steinerMode === 'safe') {
                    for (const sp of allSteiner2D) {
                        const dist = minDistToBoundary(sp.x, sp.y, entry.boundary);
                        if (dist >= minDistToEdge) {
                            usedSteiner2D.push(sp);
                        } else {
                            rejectedSteiner.push(sp);
                        }
                    }
                }

                entry.steinerPts = usedSteiner2D.map(p => [p.x, p.y]);
                entry.rejectedSteiner = rejectedSteiner.map(p => [p.x, p.y]);

                // Build CDT input
                const vertices = [];
                const edges = [];

                for (const p of points2D) {
                    vertices.push([p.x, p.y]);
                }
                for (let i = 0; i < points2D.length; i++) {
                    edges.push([i, (i + 1) % points2D.length]);
                }

                for (const sp of usedSteiner2D) {
                    vertices.push([sp.x, sp.y]);
                }

                entry.constraintEdges = edges.slice(); // copy

                // Run CDT
                let allTriangles;
                try {
                    allTriangles = cdt2d(vertices, edges);
                } catch (e) {
                    entry.status = 'cdt-fail';
                    entry.statusMsg = `CDT failed: ${e.message}`;
                    ringAnalysis.push(entry);
                    continue;
                }

                entry.allVertices = vertices;
                entry.allTriangles = allTriangles;

                // Collect all CDT edges for wireframe
                entry.allCDTEdges = collectAllEdges(vertices, allTriangles);

                // Filter triangles
                const boundaryForFilter = points2D.map(p => [p.x, p.y]);
                const keptTriangles = filterTriangles(vertices, allTriangles, boundaryForFilter);

                const filteredOut = allTriangles.filter(tri => {
                    const centroid = triangleCentroid(vertices, tri);
                    return !pointInPolygon(centroid, boundaryForFilter);
                });

                for (const tri of keptTriangles) {
                    const verts = [vertices[tri[0]], vertices[tri[1]], vertices[tri[2]]];
                    const centroid = triangleCentroid(vertices, tri);
                    entry.keptTris.push({ verts, centroid, indices: tri });
                }

                for (const tri of filteredOut) {
                    const verts = [vertices[tri[0]], vertices[tri[1]], vertices[tri[2]]];
                    const centroid = triangleCentroid(vertices, tri);
                    entry.filteredTris.push({ verts, centroid, indices: tri });
                }

                // Detect gaps
                entry.gapEdges = detectGaps(vertices, allTriangles, edges, boundaryForFilter);

                const totalFromCDT = allTriangles.length;
                const kept = keptTriangles.length;
                const filtered = filteredOut.length;
                const gaps = entry.gapEdges.length;

                if (gaps > 0) {
                    entry.status = 'warn';
                    entry.statusMsg = `${kept} kept, ${filtered} out, ${gaps} gap edges`;
                } else {
                    entry.statusMsg = `${kept} kept, ${filtered} filtered out of ${totalFromCDT}`;
                }

                ringAnalysis.push(entry);
            }

            updateStats();
            updateGapDetails();
        }

        // ----------------------------------------------------------------
        // UI
        // ----------------------------------------------------------------

        function buildRingList() {
            ringListEl.innerHTML = '';

            const allItem = document.createElement('div');
            allItem.className = 'ring-item' + (selectedRingIdx === -1 ? ' selected' : '');
            allItem.textContent = `All rings (${currentRings.length})`;
            allItem.onclick = () => { selectedRingIdx = -1; buildRingList(); fitView(); draw(); };
            ringListEl.appendChild(allItem);

            for (const ra of ringAnalysis) {
                const item = document.createElement('div');
                const hasGaps = ra.gapEdges.length > 0;
                const badgeCls = hasGaps ? 'badge-err'
                    : (ra.status === 'ok' ? 'badge-ok'
                    : (ra.status === 'warn' ? 'badge-warn' : 'badge-err'));
                const badgeText = hasGaps ? `${ra.gapEdges.length} gaps`
                    : (ra.status === 'ok' ? `${ra.keptTris.length} tri`
                    : (ra.status === 'empty' || ra.status === 'degenerate' || ra.status === 'skip')
                        ? ra.status : `${ra.filteredTris.length} lost`);

                item.className = 'ring-item' + (selectedRingIdx === ra.ringIdx ? ' selected' : '')
                    + (ra.pointCount === 0 ? ' empty' : '');
                item.innerHTML = `Ring ${ra.ringIdx} (${ra.pointCount} pts) <span class="badge ${badgeCls}">${badgeText}</span>`;

                if (ra.pointCount >= 3) {
                    item.onclick = () => {
                        selectedRingIdx = ra.ringIdx;
                        buildRingList();
                        fitView();
                        draw();
                    };
                }
                ringListEl.appendChild(item);
            }
        }

        function updateStats() {
            let totalKept = 0, totalFiltered = 0, totalSteiner = 0, totalRejected = 0, totalGapEdges = 0;
            let validRings = 0, problemRings = 0;

            for (const ra of ringAnalysis) {
                totalKept += ra.keptTris.length;
                totalFiltered += ra.filteredTris.length;
                totalSteiner += ra.steinerPts.length;
                totalRejected += (ra.rejectedSteiner || []).length;
                totalGapEdges += ra.gapEdges.length;
                if (ra.keptTris.length > 0) validRings++;
                if (ra.gapEdges.length > 0) problemRings++;
            }

            statsEl.innerHTML = `
                <div><span class="label">Steiner mode:</span> <span class="val">${steinerMode}${steinerMode === 'safe' ? ' (min ' + minDistToEdge + '°)' : ''}</span></div>
                <div><span class="label">Total rings:</span> <span class="val">${currentRings.length}</span></div>
                <div><span class="label">Valid rings:</span> <span class="val">${validRings}</span></div>
                <div><span class="label">Kept triangles:</span> <span class="good">${totalKept}</span></div>
                <div><span class="label">Filtered-out:</span> <span class="val">${totalFiltered}</span></div>
                <div><span class="label">Steiner used:</span> <span class="val">${totalSteiner}</span></div>
                <div><span class="label">Steiner rejected:</span> <span class="${totalRejected > 0 ? 'bad' : 'val'}">${totalRejected}</span></div>
                <div><span class="label">Gap edges:</span> <span class="${totalGapEdges > 0 ? 'bad' : 'val'}">${totalGapEdges}</span></div>
                <div><span class="label">Rings with gaps:</span> <span class="${problemRings > 0 ? 'bad' : 'val'}">${problemRings}</span></div>
            `;
        }

        function updateGapDetails() {
            const visibleRings = selectedRingIdx === -1
                ? ringAnalysis
                : (ringAnalysis[selectedRingIdx] ? [ringAnalysis[selectedRingIdx]] : []);

            let html = '<h3 style="margin:0 0 4px; color:#f72585;">Gap Edge Details</h3>';
            let totalGaps = 0;

            for (const ra of visibleRings) {
                if (ra.gapEdges.length === 0) continue;
                html += `<div style="margin-top:4px; color:#ccc;">Ring ${ra.ringIdx}:</div>`;
                for (const ge of ra.gapEdges) {
                    const isBoundaryA = ge.a < ra.numBoundaryVerts;
                    const isBoundaryB = ge.b < ra.numBoundaryVerts;
                    const typeA = isBoundaryA ? `bnd[${ge.a}]` : `stn[${ge.a - ra.numBoundaryVerts}]`;
                    const typeB = isBoundaryB ? `bnd[${ge.b}]` : `stn[${ge.b - ra.numBoundaryVerts}]`;
                    const len = Math.hypot(ge.vA[0] - ge.vB[0], ge.vA[1] - ge.vB[1]);
                    html += `<div class="gap-edge">${typeA} - ${typeB} (len: ${len.toFixed(3)})</div>`;
                    totalGaps++;
                }
            }

            if (totalGaps === 0) {
                html += '<div style="color:#52b788;">No gaps detected</div>';
            }

            gapDetailsEl.innerHTML = html;
        }

        // ----------------------------------------------------------------
        // 2D Canvas drawing
        // ----------------------------------------------------------------

        function fitView() {
            const dpr = window.devicePixelRatio || 1;
            const W = canvas.clientWidth;
            const H = canvas.clientHeight;
            canvas.width = W * dpr;
            canvas.height = H * dpr;

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            const visibleRings = selectedRingIdx === -1 ? ringAnalysis : [ringAnalysis[selectedRingIdx]];

            for (const ra of visibleRings) {
                if (!ra.bbox) continue;
                minX = Math.min(minX, ra.bbox.minX);
                maxX = Math.max(maxX, ra.bbox.maxX);
                minY = Math.min(minY, ra.bbox.minY);
                maxY = Math.max(maxY, ra.bbox.maxY);
            }

            if (!isFinite(minX)) return;

            const pad = 0.08;
            const rangeX = maxX - minX;
            const rangeY = maxY - minY;
            minX -= rangeX * pad;
            maxX += rangeX * pad;
            minY -= rangeY * pad;
            maxY += rangeY * pad;

            const scaleX = (W * dpr) / (maxX - minX);
            const scaleY = (H * dpr) / (maxY - minY);
            viewScale = Math.min(scaleX, scaleY);
            viewOffX = -minX * viewScale + ((W * dpr) - (maxX - minX) * viewScale) / 2;
            viewOffY = maxY * viewScale + ((H * dpr) - (maxY - minY) * viewScale) / 2;
        }

        function toScreen(x, y) {
            return [x * viewScale + viewOffX, -y * viewScale + viewOffY];
        }

        function draw() {
            const W = canvas.width;
            const H = canvas.height;
            ctx.clearRect(0, 0, W, H);

            const visibleRings = selectedRingIdx === -1
                ? ringAnalysis
                : (ringAnalysis[selectedRingIdx] ? [ringAnalysis[selectedRingIdx]] : []);

            for (const ra of visibleRings) {
                drawRing(ra);
            }

            updateGapDetails();
        }

        function drawRing(ra) {
            if (!ra.boundary || ra.boundary.length === 0) return;

            // 1) All CDT edges (wireframe, very faint)
            if (showAllCDTEdges) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
                ctx.lineWidth = 0.5;
                for (const [a, b] of ra.allCDTEdges) {
                    const [sx0, sy0] = toScreen(a[0], a[1]);
                    const [sx1, sy1] = toScreen(b[0], b[1]);
                    ctx.beginPath();
                    ctx.moveTo(sx0, sy0);
                    ctx.lineTo(sx1, sy1);
                    ctx.stroke();
                }
            }

            // 2) Kept triangles (filled green)
            for (const tri of ra.keptTris) {
                ctx.beginPath();
                const [sx0, sy0] = toScreen(tri.verts[0][0], tri.verts[0][1]);
                const [sx1, sy1] = toScreen(tri.verts[1][0], tri.verts[1][1]);
                const [sx2, sy2] = toScreen(tri.verts[2][0], tri.verts[2][1]);
                ctx.moveTo(sx0, sy0);
                ctx.lineTo(sx1, sy1);
                ctx.lineTo(sx2, sy2);
                ctx.closePath();
                ctx.fillStyle = 'rgba(82, 183, 136, 0.3)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(82, 183, 136, 0.5)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }

            // 3) Filtered-out triangles (filled red)
            if (showFilteredOut) {
                for (const tri of ra.filteredTris) {
                    ctx.beginPath();
                    const [sx0, sy0] = toScreen(tri.verts[0][0], tri.verts[0][1]);
                    const [sx1, sy1] = toScreen(tri.verts[1][0], tri.verts[1][1]);
                    const [sx2, sy2] = toScreen(tri.verts[2][0], tri.verts[2][1]);
                    ctx.moveTo(sx0, sy0);
                    ctx.lineTo(sx1, sy1);
                    ctx.lineTo(sx2, sy2);
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(231, 111, 81, 0.35)';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(231, 111, 81, 0.7)';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }

            // 4) Gap edges (bright magenta, thick)
            if (showGaps) {
                ctx.strokeStyle = '#f72585';
                ctx.lineWidth = 3;
                for (const ge of ra.gapEdges) {
                    const [sx0, sy0] = toScreen(ge.vA[0], ge.vA[1]);
                    const [sx1, sy1] = toScreen(ge.vB[0], ge.vB[1]);
                    ctx.beginPath();
                    ctx.moveTo(sx0, sy0);
                    ctx.lineTo(sx1, sy1);
                    ctx.stroke();
                }

                // Draw gap edge midpoints
                ctx.fillStyle = '#f72585';
                for (const ge of ra.gapEdges) {
                    const midX = (ge.vA[0] + ge.vB[0]) / 2;
                    const midY = (ge.vA[1] + ge.vB[1]) / 2;
                    const [sx, sy] = toScreen(midX, midY);
                    ctx.beginPath();
                    ctx.arc(sx, sy, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // 5) Steiner points (used = purple, rejected = red outline)
            if (showSteiner) {
                for (const sp of ra.steinerPts) {
                    const [sx, sy] = toScreen(sp[0], sp[1]);
                    ctx.beginPath();
                    ctx.arc(sx, sy, 4, 0, Math.PI * 2);
                    ctx.fillStyle = '#7209b7';
                    ctx.fill();
                    ctx.strokeStyle = '#9d4edd';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                // Rejected Steiner points (shown as red X)
                if (ra.rejectedSteiner) {
                    ctx.strokeStyle = '#e76f51';
                    ctx.lineWidth = 2;
                    for (const sp of ra.rejectedSteiner) {
                        const [sx, sy] = toScreen(sp[0], sp[1]);
                        const r = 4;
                        ctx.beginPath();
                        ctx.moveTo(sx - r, sy - r); ctx.lineTo(sx + r, sy + r);
                        ctx.moveTo(sx + r, sy - r); ctx.lineTo(sx - r, sy + r);
                        ctx.stroke();
                    }
                }
            }

            // 6) Boundary polygon (yellow, thick)
            ctx.beginPath();
            for (let i = 0; i < ra.boundary.length; i++) {
                const [sx, sy] = toScreen(ra.boundary[i][0], ra.boundary[i][1]);
                if (i === 0) ctx.moveTo(sx, sy);
                else ctx.lineTo(sx, sy);
            }
            ctx.closePath();
            ctx.strokeStyle = '#e9c46a';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 7) Boundary vertices with labels
            for (let i = 0; i < ra.boundary.length; i++) {
                const [sx, sy] = toScreen(ra.boundary[i][0], ra.boundary[i][1]);

                // Vertex dot
                ctx.beginPath();
                ctx.arc(sx, sy, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#e9c46a';
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Vertex index label
                if (showLabels) {
                    ctx.fillStyle = '#fff';
                    ctx.font = `bold ${11 * (window.devicePixelRatio || 1)}px monospace`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText(String(i), sx, sy - 7);
                }
            }
        }

        // ----------------------------------------------------------------
        // Event handlers
        // ----------------------------------------------------------------

        countrySelect.addEventListener('change', () => loadCountry(countrySelect.value));
        provinceSelect.addEventListener('change', selectProvince);

        document.getElementById('btnShowAll').addEventListener('click', () => {
            selectedRingIdx = -1;
            buildRingList();
            fitView();
            draw();
        });

        document.getElementById('btnToggleFiltered').addEventListener('click', () => {
            showFilteredOut = !showFilteredOut;
            draw();
        });

        document.getElementById('btnToggleSteiner').addEventListener('click', () => {
            showSteiner = !showSteiner;
            draw();
        });

        document.getElementById('btnToggleLabels').addEventListener('click', () => {
            showLabels = !showLabels;
            draw();
        });

        document.getElementById('btnToggleGaps').addEventListener('click', () => {
            showGaps = !showGaps;
            draw();
        });

        document.getElementById('btnToggleAllCDT').addEventListener('click', () => {
            showAllCDTEdges = !showAllCDTEdges;
            draw();
        });

        function setSteinerMode(mode) {
            steinerMode = mode;
            // Update button styles
            document.getElementById('btnSteinerAll').style.background = mode === 'all' ? '#1b4332' : '';
            document.getElementById('btnSteinerNone').style.background = mode === 'none' ? '#1b4332' : '';
            document.getElementById('btnSteinerSafe').style.background = mode === 'safe' ? '#1b4332' : '';
            // Re-run analysis
            analyzeRings();
            buildRingList();
            draw();
        }

        document.getElementById('btnSteinerAll').addEventListener('click', () => setSteinerMode('all'));
        document.getElementById('btnSteinerNone').addEventListener('click', () => setSteinerMode('none'));
        document.getElementById('btnSteinerSafe').addEventListener('click', () => {
            minDistToEdge = parseFloat(document.getElementById('minDistInput').value) || 0.5;
            setSteinerMode('safe');
        });

        document.getElementById('btnToggleClean').addEventListener('click', () => {
            applyClean = !applyClean;
            const btn = document.getElementById('btnToggleClean');
            btn.textContent = `Clean polygons: ${applyClean ? 'ON' : 'OFF'}`;
            btn.style.background = applyClean ? '#1b4332' : '';
            analyzeRings();
            buildRingList();
            draw();
        });

        document.getElementById('minDistInput').addEventListener('change', () => {
            minDistToEdge = parseFloat(document.getElementById('minDistInput').value) || 0.5;
            if (steinerMode === 'safe') {
                analyzeRings();
                buildRingList();
                draw();
            }
        });

        // Tooltip on hover - show nearest vertex info
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            const mx = (e.clientX - rect.left) * dpr;
            const my = (e.clientY - rect.top) * dpr;

            const dataX = (mx - viewOffX) / viewScale;
            const dataY = -(my - viewOffY) / viewScale;

            tooltip.style.left = (e.clientX + 12) + 'px';
            tooltip.style.top = (e.clientY + 12) + 'px';
            tooltip.style.display = 'block';
            tooltip.textContent = `lon: ${dataX.toFixed(3)}, lat: ${dataY.toFixed(3)}`;
        });

        canvas.addEventListener('mouseleave', () => {
            tooltip.style.display = 'none';
        });

        window.addEventListener('resize', () => { fitView(); draw(); });

        // ----------------------------------------------------------------
        // Init
        // ----------------------------------------------------------------

        loadCountry('CA');
    </script>
</body>
</html>

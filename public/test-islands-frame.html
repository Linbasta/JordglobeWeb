<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test: Archipelago Overlay on Hover</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: monospace; }
        #renderCanvas { width: 100vw; height: 100vh; display: block; }

        #ui {
            position: fixed;
            top: 16px;
            left: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        button {
            padding: 8px 16px;
            font-family: monospace;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #888;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
        }
        button:hover { background: rgba(40, 40, 40, 0.9); }
        button:disabled { opacity: 0.4; cursor: default; }

        #status {
            padding: 6px 10px;
            font-size: 12px;
            color: #ccc;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 4px;
            border: 1px solid #444;
            max-width: 300px;
        }

        .info {
            margin-top: 12px;
            font-size: 11px;
            color: #888;
            max-width: 280px;
            line-height: 1.4;
        }

        #countryList {
            font-size: 10px;
            color: #666;
            margin-top: 8px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>

    <div id="ui">
        <button id="btnShowAll">Show All Overlays</button>
        <button id="btnHide">Hide All Overlays</button>
        <div id="status">Initializing...</div>
        <div class="info">
            Hover over archipelago countries to see their overlays.
            Overlays are pre-created on load.
        </div>
        <div id="countryList"></div>
    </div>


        <!-- Console logger - streams browser console to file for Claude -->
    <script type="module" src="/shared/consoleLogger.ts"></script>
    <script type="module">
        import { EarthGlobe } from '/src/earth-globe/index.ts';

        const btnShowAll = document.getElementById('btnShowAll');
        const btnHide = document.getElementById('btnHide');
        const statusEl = document.getElementById('status');
        const countryListEl = document.getElementById('countryList');

        let lastHoveredIso2 = null;
        let hoverMode = true; // When true, show overlay on hover

        function setStatus(text) {
            statusEl.textContent = text;
        }

        let globe;

        globe = new EarthGlobe({
            canvasId: 'renderCanvas',
            onReady: (g) => {
                globe = g;
                window.globe = g; // For DevTools

                // Get all archipelago codes
                const allCodes = g.getArchipelagoCodes();
                console.log('Archipelago countries:', allCodes);

                // Display the list
                countryListEl.innerHTML = '<strong>Archipelago countries:</strong><br>' +
                    allCodes.join(', ');

                setStatus(`Ready. ${allCodes.length} archipelago overlays pre-created.`);

                btnShowAll.disabled = false;
                btnHide.disabled = false;

                // Show all button
                btnShowAll.addEventListener('click', () => {
                    hoverMode = false;
                    g.showArchipelagoOverlayList(allCodes);
                    setStatus(`Showing all ${allCodes.length} overlays`);
                });

                // Hide button
                btnHide.addEventListener('click', () => {
                    hoverMode = true;
                    g.clearArchipelagoOverlay();
                    lastHoveredIso2 = null;
                    setStatus('Overlays cleared. Hover mode active.');
                });

                // Set up hover handler
                g.onCountryHover((event) => {
                    if (!hoverMode) return;

                    const iso2 = event.country?.iso2 || null;

                    // Skip if same country
                    if (iso2 === lastHoveredIso2) return;

                    // Hide previous overlay
                    if (lastHoveredIso2 && g.countryHasArchipelagoOverlay(lastHoveredIso2)) {
                        g.hideArchipelagoOverlayForCountry(lastHoveredIso2);
                    }

                    // Show new overlay if country has one
                    if (iso2 && g.countryHasArchipelagoOverlay(iso2)) {
                        g.showArchipelagoOverlayForCountry(iso2);
                        setStatus(`Hovering: ${event.country.name} (${iso2})`);
                    } else if (iso2) {
                        setStatus(`Hovering: ${event.country.name} (no overlay)`);
                    } else {
                        setStatus('Hover mode active.');
                    }

                    lastHoveredIso2 = iso2;
                });

                // Initially in hover mode
                setStatus('Hover mode active. Move over island nations.');
            }
        });
    </script>
</body>
</html>

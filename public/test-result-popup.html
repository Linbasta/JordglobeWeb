<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test: Result Popup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a1628; font-family: 'Arial', sans-serif; }

        /* Controls panel */
        #controls {
            position: fixed;
            top: 16px;
            left: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 300;
        }

        #controls button {
            padding: 8px 16px;
            font-family: monospace;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #555;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
        }
        #controls button:hover { background: rgba(60, 60, 60, 0.9); }
    </style>
</head>
<body>
    <div id="controls">
        <button onclick="show(10, 10, 83000)">Perfect: 10/10, 1:23</button>
        <button onclick="show(8, 10, 102000)">Good: 8/10, 1:42</button>
        <button onclick="show(5, 10, 145000)">Mid: 5/10, 2:25</button>
        <button onclick="show(2, 10, 200000)">Bad: 2/10, 3:20</button>
        <button onclick="show(35, 35, 312000)">Perfect 35: 35/35, 5:12</button>
        <button onclick="show(1, 35, 400000)">Bad 35: 1/35, 6:40</button>
    </div>

    <script type="module" src="/shared/consoleLogger.ts"></script>
    <script type="module">
        import { showResultOverlay, hideResultOverlay } from '/src/shared/ui/result-overlay.ts';

        function randomResults(score, total) {
            const arr = Array(score).fill(true).concat(Array(total - score).fill(false));
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        window.show = function(score, total, elapsedMs) {
            showResultOverlay({
                score, total, elapsedMs,
                results: randomResults(score, total),
                quizTitle: 'Eurovision Quiz',
                shareUrl: 'https://jordglobe.com/eurovision',
                shareEmoji: '🎵',
                spritePath: '/eurovision/',
                onRetry: () => hideResultOverlay(),
            });
        };

        // Show a default on load
        show(8, 10, 102000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Province Borders Test</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #renderCanvas { width: 100%; height: 100vh; touch-action: none; }
        #overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.75);
            color: #eee;
            padding: 12px 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
            pointer-events: none;
            min-width: 220px;
        }
        #overlay h3 { margin: 0 0 8px; color: #fff; font-size: 14px; }
        .ok  { color: #6f6; }
        .err { color: #f66; }
        .loading { color: #fa0; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <div id="overlay">
        <h3>Province Border Test</h3>
        <div id="status">Initializing globe…</div>
        <div id="border-list"></div>
        <div id="zoom-info" style="margin-top:8px; color:#aaa;"></div>
    </div>

    <!-- Console logger - streams browser console to file for Claude -->
    <script type="module" src="/shared/consoleLogger.ts"></script>

    <script type="module">
        import { EarthGlobe } from '/src/earth-globe/index.ts';
        import {
            loadProvinceBorders,
            showProvinceBorders,
            updateProvinceBorderUniforms,
        } from '/src/earth-globe/province-border-renderer.ts';
        import { getZoomValue } from '/src/shared/animation/camera-utils.ts';
        import { zoom } from '/src/earth-globe/constants.ts';

        const statusEl = document.getElementById('status');
        const borderListEl = document.getElementById('border-list');
        const zoomInfoEl = document.getElementById('zoom-info');

        function setStatus(msg, cls = '') {
            statusEl.textContent = msg;
            statusEl.className = cls;
        }

        function addBorderItem(iso2, ok, detail = '') {
            const div = document.createElement('div');
            div.className = ok ? 'ok' : 'err';
            div.textContent = `${ok ? '✓' : '✗'} ${iso2}${detail ? ' — ' + detail : ''}`;
            borderListEl.appendChild(div);
        }

        const globe = new EarthGlobe({
            canvasId: 'renderCanvas',
            onReady: async (g) => {
                setStatus('Globe ready. Loading province index…', 'loading');

                // Fetch province index
                let countries = [];
                try {
                    const resp = await fetch('/provinces/index.json');
                    if (resp.ok) {
                        countries = await resp.json();
                    } else {
                        // Fall back: scan known countries
                        countries = ['US'];
                        console.warn('No /provinces/index.json found, falling back to ["US"]');
                    }
                } catch {
                    countries = ['US'];
                }

                setStatus(`Loading ${countries.length} province overlay(s)…`, 'loading');

                // Load all overlays in parallel
                const states = [];
                await Promise.all(countries.map(async (iso2) => {
                    try {
                        const state = await loadProvinceBorders(g.getScene(), iso2);
                        showProvinceBorders(state);
                        states.push(state);
                        addBorderItem(iso2, true, `${g.getScene().meshes.filter(m => m.name.startsWith('provinceBorders')).length} mesh(es)`);
                    } catch (e) {
                        addBorderItem(iso2, false, String(e));
                        console.error(`Failed to load province borders for ${iso2}:`, e);
                    }
                }));

                setStatus(`${states.length}/${countries.length} overlays loaded`, states.length === countries.length ? 'ok' : 'err');

                // Update border uniforms each frame based on zoom
                const scene = g.getScene();
                const camera = g.getCamera();
                scene.registerBeforeRender(() => {
                    const dist = camera.radius;
                    for (const state of states) {
                        updateProvinceBorderUniforms(state, dist);
                    }
                    zoomInfoEl.textContent = `zoom radius: ${dist.toFixed(2)}`;
                });
            }
        });
    </script>
</body>
</html>

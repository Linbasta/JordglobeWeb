<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-itunes-app" content="app-id=1599500931">
    <title>Flag Quiz Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        body.placing-mode { cursor: none; }
        #renderCanvas { width: 100%; height: 100vh; touch-action: none; }
    </style>
</head>

<body>
    <canvas id="renderCanvas"></canvas>
    <!-- Console logger - streams browser console to file for Claude -->
    <script type="module" src="/shared/consoleLogger.ts"></script>
    <script type="module">
        import { initAppBanner } from '/src/shared/ui/app-banner.ts';
        import { startQuizGame } from '/src/solo/start-quiz-game.ts';
        initAppBanner();

        const countries = [
            { iso2: 'SE', name: 'Sweden' },
            { iso2: 'NO', name: 'Norway' },
            { iso2: 'FI', name: 'Finland' },
            { iso2: 'DK', name: 'Denmark' },
            { iso2: 'IS', name: 'Iceland' },
            { iso2: 'GB', name: 'United Kingdom' },
            { iso2: 'IE', name: 'Ireland' },
            { iso2: 'FR', name: 'France' },
            { iso2: 'ES', name: 'Spain' },
            { iso2: 'PT', name: 'Portugal' },
            { iso2: 'DE', name: 'Germany' },
            { iso2: 'NL', name: 'Netherlands' },
            { iso2: 'BE', name: 'Belgium' },
            { iso2: 'CH', name: 'Switzerland' },
            { iso2: 'AT', name: 'Austria' },
            { iso2: 'IT', name: 'Italy' },
            { iso2: 'GR', name: 'Greece' },
            { iso2: 'PL', name: 'Poland' },
            { iso2: 'CZ', name: 'Czech Republic' },
            { iso2: 'HU', name: 'Hungary' },
            { iso2: 'RO', name: 'Romania' },
            { iso2: 'BG', name: 'Bulgaria' },
            { iso2: 'JP', name: 'Japan' },
            { iso2: 'KR', name: 'South Korea' },
            { iso2: 'BR', name: 'Brazil' },
            { iso2: 'AR', name: 'Argentina' },
            { iso2: 'US', name: 'United States' },
            { iso2: 'CA', name: 'Canada' },
            { iso2: 'AU', name: 'Australia' },
            { iso2: 'NZ', name: 'New Zealand' },
        ];

        startQuizGame({
            title: 'Loading Flag Quiz',
            questions: countries.map(country => ({
                present: 'image',
                answer: 'country',
                countryISO2: country.iso2,
                prompt: '',
                imageUrl: `/_flags/${country.iso2}.png`,
                imageFrame: 'simple',
            })),
            onGameComplete: (score, total) => {
                alert(`Flag Quiz Complete!\n\nScore: ${score}/${total}\n\nReload page to play again!`);
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Location Markers Test (Pooled)</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      #renderCanvas {
        width: 100%;
        height: 100vh;
        touch-action: none;
      }
      #info {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 15px;
        border-radius: 8px;
        font-family: monospace;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="info">
      <h3>Location Markers Test (Pooled)</h3>
      <p>Hockey puck markers placed at various capital cities</p>
      <p><small>200 markers pre-loaded, batched rendering enabled</small></p>
      <div id="status"></div>
    </div>
    <!-- Console logger - streams browser console to file for Claude -->
    <script type="module" src="/shared/consoleLogger.ts"></script>
    <script type="module" src="/src/tests/test-location-markers.ts"></script>
  </body>
</html>

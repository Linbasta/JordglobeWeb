<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Quiz Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        body.placing-mode { cursor: none; }
        #renderCanvas { width: 100%; height: 100vh; touch-action: none; }
    </style>
</head>

<body>
    <canvas id="renderCanvas"></canvas>

    <!-- Console logger - streams browser console to file for Claude -->
    <script type="module" src="/shared/consoleLogger.ts"></script>

    <script type="module">
        import { startQuizGame } from '/src/solo/start-quiz-game.ts';

        // [youtubeId, lat, lng, prompt, startTime, endTime]
        const VIDEO_QUESTIONS = [
            ['dQw4w9WgXcQ', 51.51, -0.13, 'Where was this music video filmed?', 0, 30],
            ['JGwWNGJdvx8', 37.57, 126.98, 'Where is this song from?', 0, 30],
            ['kJQP7kiw5Fk', 6.25, -75.56, 'Where was this music video filmed?', 0, 30],
        ];

        startQuizGame({
            title: 'Loading Video Quiz',
            questions: VIDEO_QUESTIONS.map(([youtubeId, lat, lng, prompt, start, end]) => ({
                present: 'video',
                answer: 'location-guess',
                youtubeId,
                lat,
                lng,
                prompt,
                startTime: start,
                endTime: end,
            })),
            onGameComplete: (score, total) => {
                alert(`Video Quiz Complete!\n\nScore: ${score}/${total}\n\nReload page to play again!`);
            }
        });
    </script>
</body>

</html>
